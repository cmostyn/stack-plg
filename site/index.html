<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0;url=dashboard.html">
  <title>PLG-Hub</title>
  <link rel="stylesheet" href="style.css">
  <script>window.location.replace('dashboard.html');</script>

</head>
<body>

  <header class="site-header">
    <div class="site-header-inner">
      <span class="site-logo">
        <svg width="20" height="20" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg"><g clip-path="url(#so-logo-clip)"><path d="M85.334 103.111H170.667V53.333H129.906C105.289 53.333 85.334 53.333 85.334 79.4353V103.111Z" fill="url(#so-logo-g1)"/><path d="M170.667 152.888H85.334V202.665H126.095C150.712 202.665 170.667 202.665 170.667 176.563V152.888Z" fill="url(#so-logo-g2)"/><path d="M170.667 53.333H85.6178H0L4.17922e-06 152.889H85.6178V103.12L85.6059 101.011C85.4556 74.7235 106.724 53.333 133.012 53.333H170.667Z" fill="#00AF66"/><path d="M85.334 202.666H170.383H256.001V103.11H170.383V152.879L170.395 154.988C170.545 181.275 149.276 202.666 122.988 202.666H85.334Z" fill="#00AF66"/></g><defs><linearGradient id="so-logo-g1" x1="170.667" y1="78.2219" x2="85.334" y2="78.2219" gradientUnits="userSpaceOnUse"><stop stop-color="#00AF66"/><stop offset="1" stop-color="#285C4D"/></linearGradient><linearGradient id="so-logo-g2" x1="85.334" y1="177.777" x2="170.667" y2="177.777" gradientUnits="userSpaceOnUse"><stop stop-color="#00AF66"/><stop offset="1" stop-color="#285C4D"/></linearGradient><clipPath id="so-logo-clip"><rect width="256" height="149.333" fill="white" transform="translate(0 53.333)"/></clipPath></defs></svg>
        PLG-Hub
      </span>
      <nav class="site-nav">
        <a href="dashboard.html" class="site-nav-link">Dashboard</a>
        <a href="crm.html" class="site-nav-link">Customer List</a>
        <a href="index.html" class="site-nav-link site-nav-link--active">Customer Support</a>
        <a href="connectors.html" class="site-nav-link">Connectors</a>
      </nav>
    </div>
  </header>

  <main class="page-main">
    <h1 class="page-heading">Customer Support</h1>
    <p class="page-subheading">Weekly support digests and customer health analysis.</p>

    <div class="digest-list" id="digest-list">
      <!-- Populated by manifest.json -->
    </div>

    <div class="empty-state" id="empty-state" style="display: none;">
      <p class="empty-state-heading">No digests yet</p>
      <p class="empty-state-body">The first digest will appear here after Claude Cowork runs on Tuesday.</p>
    </div>
  </main>

  <script>
    const list = document.getElementById('digest-list');
    const empty = document.getElementById('empty-state');

    fetch('manifest.json')
      .then(r => r.json())
      .then(digests => {
        if (!digests.length) {
          empty.style.display = 'block';
          return;
        }

        // Most recent first
        const sorted = digests.slice().sort((a, b) => b.date.localeCompare(a.date));

        sorted.forEach(d => {
          const card = document.createElement('a');
          card.className = 'digest-card';
          card.href = `reports/${d.date}/`;
          card.innerHTML = `
            <div class="digest-card-left">
              <div class="digest-card-icon">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                  <rect x="2" y="1" width="10" height="13" rx="1.5"/>
                  <line x1="4.5" y1="5" x2="9.5" y2="5"/>
                  <line x1="4.5" y1="7.5" x2="9.5" y2="7.5"/>
                  <line x1="4.5" y1="10" x2="7.5" y2="10"/>
                </svg>
              </div>
              <div>
                <div class="digest-card-title">${d.title}</div>
                <div class="digest-card-date">${formatDate(d.date)}</div>
              </div>
            </div>
            <svg class="digest-card-arrow" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 3l5 5-5 5"/>
            </svg>
          `;
          list.appendChild(card);
        });
      })
      .catch(() => {
        empty.style.display = 'block';
      });

    function formatDate(iso) {
      // iso = "2026-03-18"
      const [y, m, d] = iso.split('-').map(Number);
      const date = new Date(y, m - 1, d);
      return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
    }
  </script>

</body>
</html>
