<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CS Tasks — CS-Hub</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Page shell ─────────────────────────────────────────── */
    .tasks-page { display: flex; flex-direction: column; min-height: 100vh; background: #EEF8F3; }

    /* ── Toolbar ────────────────────────────────────────────── */
    .tasks-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 28px 0;
      gap: 12px;
      flex-wrap: wrap;
    }
    .tasks-toolbar-left  { display: flex; align-items: center; gap: 4px; }
    .tasks-toolbar-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    /* Tab pills */
    .tasks-tab {
      position: relative;
      background: none;
      border: none;
      padding: 10px 4px 12px;
      margin-right: 20px;
      font-family: var(--so-font-body);
      font-size: 14px;
      font-weight: 500;
      color: var(--so-text-tag);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.15s;
      white-space: nowrap;
    }
    .tasks-tab::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      border-radius: 2px 2px 0 0;
      background: var(--so-primary);
      transform: scaleX(0);
      transition: transform 0.2s ease;
    }
    .tasks-tab--active { color: var(--so-text-header); }
    .tasks-tab--active::after { transform: scaleX(1); }
    .tasks-tab:hover { color: var(--so-text-header); }

    .tab-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .tab-dot--overdue  { background: var(--so-red-dark); }
    .tab-dot--upcoming { background: var(--so-primary); }

    .tasks-tab-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 20px;
      height: 20px;
      padding: 0 6px;
      background: var(--so-neutral-5);
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      color: var(--so-text-body);
    }
    .tasks-tab-count:empty { display: none; }
    .tasks-tab-count--overdue { background: rgba(196,62,62,0.10); color: var(--so-red-dark); }

    /* Type + Priority pill groups — capsule style matching CRM */
    .crm-pill-group {
      display: flex;
      gap: 2px;
      background: var(--so-neutral-5);
      border-radius: 7px;
      padding: 3px;
    }

    /* Priority pills — restyled to match CRM capsule */
    .priority-pills {
      display: flex;
      gap: 2px;
      background: var(--so-neutral-5);
      border-radius: 7px;
      padding: 3px;
    }
    .priority-pill {
      background: none;
      border: none;
      border-radius: 5px;
      padding: 4px 10px;
      font-size: 13px;
      font-weight: 400;
      color: var(--so-text-tag);
      cursor: pointer;
      font-family: var(--so-font-body);
      transition: background 0.1s, color 0.1s;
      white-space: nowrap;
    }
    .priority-pill:hover { background: #fff; color: var(--so-text-body); }
    .priority-pill--active {
      background: #fff;
      color: var(--so-green-dark);
      font-weight: 500;
      box-shadow: 0 1px 2px rgba(0,0,0,0.08);
    }

    /* New task button */
    .btn-new-task {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      background: var(--so-primary);
      color: #fff;
      border: none;
      border-radius: var(--so-radius);
      font-family: var(--so-font-body);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 1px 3px rgba(0,175,102,0.3);
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .btn-new-task:hover  { background: var(--so-green-dark); }
    .btn-new-task:active { transform: scale(0.97); }

    /* ── Card / Table ───────────────────────────────────────── */
    .tasks-card {
      margin: 16px 28px 28px;
      background: #fff;
      border: 1px solid var(--so-neutral-10);
      border-radius: var(--so-radius-lg);
      box-shadow: var(--so-shadow-card);
      overflow: hidden;
    }

    .tasks-table-head {
      display: grid;
      grid-template-columns: 36px 1fr 100px 110px 160px 40px;
      padding: 10px 20px;
      border-bottom: 1px solid var(--so-neutral-5);
      background: var(--so-background);
    }
    .tasks-col-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--so-neutral-40);
      font-family: var(--so-font-tag);
      text-align: left;
    }

    /* Task rows */
    .tasks-list { min-height: 120px; }

    .task-row {
      display: grid;
      grid-template-columns: 36px 1fr 100px 110px 160px 40px;
      align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid var(--so-neutral-5);
      transition: background 0.12s;
      opacity: 0;
      transform: translateY(8px);
      animation: rowIn 0.25s ease forwards;
    }
    .task-row:last-child { border-bottom: none; }
    .task-row:hover { background: var(--so-neutral-5); }
    .task-row--done { opacity: 0.5; }
    .task-row--done .task-name { text-decoration: line-through; color: var(--so-text-tag); }
    .task-row--overdue { background: rgba(196,62,62,0.03); }
    .task-row--exit { animation: rowOut 0.22s ease forwards; }

    @keyframes rowIn  { to { opacity: 1; transform: translateY(0); } }
    @keyframes rowOut { to { opacity: 0; transform: translateX(-12px); } }

    .task-row:nth-child(1)  { animation-delay: 0.02s; }
    .task-row:nth-child(2)  { animation-delay: 0.06s; }
    .task-row:nth-child(3)  { animation-delay: 0.10s; }
    .task-row:nth-child(4)  { animation-delay: 0.14s; }
    .task-row:nth-child(5)  { animation-delay: 0.18s; }
    .task-row:nth-child(6)  { animation-delay: 0.22s; }
    .task-row:nth-child(7)  { animation-delay: 0.26s; }
    .task-row:nth-child(8)  { animation-delay: 0.30s; }
    .task-row:nth-child(9)  { animation-delay: 0.34s; }
    .task-row:nth-child(10) { animation-delay: 0.38s; }

    /* Checkbox */
    .task-check {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 1.5px solid var(--so-neutral-15);
      background: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
    }
    .task-check:hover { border-color: var(--so-primary); transform: scale(1.1); }
    .task-check.done  { background: var(--so-primary); border-color: var(--so-primary); }
    .task-check svg   { width: 11px; height: 11px; stroke: #fff; stroke-width: 2.4; }

    /* Task name cell */
    .task-name-cell { padding-right: 12px; }
    .task-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--so-text-header);
      font-family: var(--so-font-body);
      line-height: 1.3;
    }

    /* Priority badge */
    .priority-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 3px 10px;
      border-radius: var(--so-radius-xl);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-family: var(--so-font-tag);
    }
    .priority-high { background: rgba(196,62,62,0.10); color: var(--so-red-dark); }
    .priority-med  { background: rgba(241,139,10,0.10); color: #96580A; }
    .priority-low  { background: rgba(0,175,102,0.10);  color: var(--so-green-dark); }

    /* Due date */
    .task-due { font-size: 13px; color: var(--so-text-tag); font-family: var(--so-font-body); cursor: pointer; }
    .task-due--overdue { color: var(--so-red-dark); font-weight: 500; }

    /* Inline due date input */
    .task-due-input {
      font-size: 13px;
      border: 1px solid var(--so-primary);
      border-radius: var(--so-radius);
      padding: 3px 6px;
      background: #fff;
      outline: none;
      box-shadow: 0 0 0 3px rgba(0,175,102,0.10);
      width: 130px;
      font-family: var(--so-font-body);
      color: var(--so-text-body);
    }

    /* Client — clickable name */
    .task-client {
      font-size: 13px; font-weight: 500; color: var(--so-primary);
      font-family: var(--so-font-body); background: none; border: none;
      padding: 0; cursor: pointer; text-align: left;
    }
    .task-client:hover { text-decoration: underline; }

    /* Inline client select */
    .task-client-select {
      font-size: 13px;
      border: 1px solid var(--so-primary);
      border-radius: var(--so-radius);
      padding: 3px 8px;
      color: var(--so-text-body);
      background: #fff;
      outline: none;
      box-shadow: 0 0 0 3px rgba(0,175,102,0.10);
      width: 150px;
      font-family: var(--so-font-body);
    }

    /* No-client assign button */
    .task-client-assign {
      font-size: 13px; color: var(--so-neutral-30); font-family: var(--so-font-body);
      background: none; border: none; padding: 0; cursor: pointer;
    }
    .task-client-assign:hover { color: var(--so-text-tag); }

    /* Delete */
    .task-delete {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; border-radius: var(--so-radius);
      color: var(--so-neutral-30); cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s, background 0.15s;
    }
    .task-row:hover .task-delete { opacity: 1; }
    .task-delete:hover { color: var(--so-red-dark); background: rgba(196,62,62,0.08); }
    .task-delete svg { width: 14px; height: 14px; }

    /* Empty / error */
    .tasks-empty { padding: 56px 24px; text-align: center; color: var(--so-text-tag); font-size: 14px; font-family: var(--so-font-body); }
    .tasks-error { color: var(--so-red-dark); }

    /* ── Footer ─────────────────────────────────────────────── */
    .tasks-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-top: 1px solid var(--so-neutral-5);
      background: var(--so-background);
    }
    .tasks-footer-count { font-size: 13px; color: var(--so-text-tag); font-family: var(--so-font-body); }

    /* ── Inline new-task row ──────────────────────────────────── */
    .task-row--new {
      background: #F7FDF9;
      display: grid;
      grid-template-columns: 36px 1fr 100px 110px 160px 40px;
      align-items: center;
      padding: 12px 20px;
      border-bottom: 1px solid var(--so-neutral-5);
    }
    .task-new-input {
      font-size: 14px;
      font-weight: 500;
      color: var(--so-text-header);
      font-family: var(--so-font-body);
      border: none;
      outline: none;
      background: transparent;
      width: 100%;
      padding-right: 12px;
    }
    .task-new-input::placeholder { color: var(--so-neutral-30); font-weight: 400; }
    .task-new-hint {
      font-size: 11px;
      color: var(--so-text-tag);
      padding: 3px 20px 8px 76px;
    }
    .task-new-hint kbd {
      display: inline-block;
      background: var(--so-neutral-5);
      color: var(--so-text-body);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 10px;
      font-weight: 600;
      font-family: var(--so-font-body);
    }
    .task-cell-placeholder {
      font-size: 12px;
      color: var(--so-neutral-30);
      font-style: italic;
      font-family: var(--so-font-body);
    }
  </style>
</head>
<body class="tasks-page">

  <main style="flex:1">

    <div class="tasks-toolbar">

          To do
          <span class="tasks-tab-count" id="count-todo"></span>

        <button class="tasks-tab" data-tab="completed">

          <span class="tasks-tab-count" id="count-completed"></span>

      </div>

      <div class="tasks-toolbar-right">

        <!-- 1. Search -->
        <div class="crm-search-wrap">
          <svg class="crm-search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="6.5" cy="6.5" r="4.5"/><line x1="10.5" y1="10.5" x2="14.5" y2="14.5"/>

        <div class="crm-pill-group" id="type-pills">

        <div class="crm-strategic-wrap tasks-account-wrap" id="tasks-account-wrap">

          </button>
          <div class="crm-strategic-dropdown" id="tasks-account-dropdown" style="max-height:260px;overflow-y:auto">
            <button class="crm-strategic-opt crm-strategic-opt--active" data-account="">All accounts</button>

        <!-- 4. Priority pills -->
        <div class="priority-pills" id="priority-pills">
          <button class="priority-pill priority-pill--active" data-priority="">All</button>

    <div class="tasks-card">
      <div class="tasks-table-head">
        <div></div>
        <div class="tasks-col-label">Task details</div>

        <div class="tasks-col-label">Due date</div>
        <div class="tasks-col-label">Client</div>
        <div></div>
      </div>
      <div id="tasks-list" class="tasks-list">

  </main>

  <!-- Card overlay (populated by openCard) -->
  <div id="card-overlay" class="card-overlay"></div>

  <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.min.js"></script>
  <script>
    const WORKER_URL = 'https://stack-plg-actions.charlie-9e7.workers.dev';

    let allActions     = [];
    let companyMap     = new Map();
    let typeMap        = new Map();   // hubspot_id → company type string
    let activeTab      = 'todo';
    let activePriority = '';
    let activeType     = '';
    let activeSearch   = '';
    let activeAccount  = '';

    // Card modal state
    let openCardId          = null;
    let pylonMap            = new Map();
    let firefliesActionsMap = new Map();

    const today = new Date().toISOString().slice(0, 10);

    function escHtml(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function safeHref(url) {
      if (!url) return '#';
      try {
        const u = new URL(url, location.href);
        return (u.protocol === 'https:' || u.protocol === 'http:') ? escHtml(url) : '#';
      } catch { return '#'; }
    }

    function isContactObj(c) {
      return c !== null && typeof c === 'object' && !Array.isArray(c);
    }

    function relativeTime(iso) {
      if (!iso) return null;
      const diff = Date.now() - new Date(iso).getTime();
      if (isNaN(diff) || diff < 0) return 'Today';
      const days = Math.floor(diff / 86400000);
      if (days === 0)  return 'Today';
      if (days === 1)  return 'Yesterday';
      if (days < 7)    return `${days} days ago`;
      if (days < 30)   return `${Math.floor(days / 7)}w ago`;
      if (days < 365)  return `${Math.floor(days / 30)}mo ago`;
      return `${Math.floor(days / 365)}y ago`;
    }

    function formatDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso + 'T00:00:00');
      return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function isOverdue(a) { return !a.done && a.due_date && a.due_date < today; }
    function tabFor(a)    { return a.done ? 'completed' : 'todo'; }
    function priorityLabel(p) { return { high: 'High', med: 'Med', low: 'Low' }[p] ?? p; }

    function filteredActions() {
      const q = activeSearch.toLowerCase();
      return allActions.filter(a => {
        if (tabFor(a) !== activeTab) return false;
        if (activePriority && a.priority !== activePriority) return false;
        if (activeType) {
          const t = typeMap.get(String(a.hubspot_id)) ?? '';
          if (t !== activeType) return false;
        }
        if (activeAccount && String(a.hubspot_id) !== activeAccount) return false;
        if (q) {
          const name   = (a.name ?? '').toLowerCase();
          const client = (companyMap.get(String(a.hubspot_id)) ?? '').toLowerCase();
          if (!name.includes(q) && !client.includes(q)) return false;
        }
        return true;
      });
    }

    function updateCounts() {
      ['todo', 'completed'].forEach(tab => {
        const n = allActions.filter(a => {
          if (tabFor(a) !== tab) return false;
          if (activePriority && a.priority !== activePriority) return false;
          if (activeType) {
            const t = typeMap.get(String(a.hubspot_id)) ?? '';
            if (t !== activeType) return false;
          }
          if (activeAccount && String(a.hubspot_id) !== activeAccount) return false;
          return true;
        }).length;
        const el = document.getElementById(`count-${tab}`);
        if (el) el.textContent = n > 0 ? n : '';
      });
    }

    function render() {
      const list  = document.getElementById('tasks-list');
      const rows  = filteredActions();
      updateCounts();

      const total    = allActions.filter(a => tabFor(a) === activeTab).length;
      const footerEl = document.getElementById('tasks-footer-count');
      if (footerEl) {
        const label = activeTab === 'completed' ? 'completed tasks' : 'active tasks';
        footerEl.textContent = total > 0 ? `Showing ${rows.length} of ${total} ${label}` : '';
      }

      if (rows.length === 0) {
        const tabLabel = activeTab === 'todo' ? 'to-do' : activeTab;
        const tag = activePriority ? ` · ${priorityLabel(activePriority)} priority` : '';
        list.innerHTML = `<div class="tasks-empty">No ${tabLabel} tasks${tag}</div>`;
        return;
      }

      list.innerHTML = rows.map(a => {
        const clientName = escHtml(companyMap.get(String(a.hubspot_id)) ?? '—');
        const dueStr  = a.due_date ? formatDate(a.due_date) : '—';
        const overdue = isOverdue(a);
        const tick    = a.done
          ? `<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,6 5,9 10,3"/></svg>`
          : '';
        const clientCell = a.hubspot_id
          ? `<button class="task-client" data-open-card="${escHtml(String(a.hubspot_id))}">${clientName}</button>`
          : `<button class="task-client-assign" data-assign-id="${escHtml(a.id)}">— assign —</button>`;
        return `
          <div class="task-row${a.done ? ' task-row--done' : ''}${overdue ? ' task-row--overdue' : ''}" data-id="${escHtml(a.id)}">
            <button class="task-check${a.done ? ' done' : ''}" data-id="${escHtml(a.id)}" aria-label="${a.done ? 'Mark open' : 'Mark done'}">${tick}</button>
            <div class="task-name-cell"><div class="task-name">${escHtml(a.name)}</div></div>
            <div><span class="priority-badge priority-${escHtml(a.priority)}">${priorityLabel(a.priority)}</span></div>
            <div class="task-due${overdue ? ' task-due--overdue' : ''}" data-due-id="${escHtml(a.id)}" title="Click to set date">${escHtml(dueStr)}</div>
            ${clientCell}
            <button class="task-delete" data-id="${escHtml(a.id)}" aria-label="Delete">
              <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="2" y1="2" x2="12" y2="12"/><line x1="12" y1="2" x2="2" y2="12"/></svg>
            </button>
          </div>`;
      }).join('');
    }

    // ── Card modal ────────────────────────────────────────────

    function renderCardLeft(company, c, gmailUrl, calls) {
      const py  = company.hubspot_id ? pylonMap.get(String(company.hubspot_id)) : null;
      const rel = relativeTime(company.last_contact);
      const abs = company.last_contact
        ? new Date(company.last_contact).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
        : null;

      const recentCalls = (calls ?? []).slice(0, 5);
      const ffHtml = recentCalls.length === 0
        ? '<p class="ff-empty">No calls on record.</p>'
        : recentCalls.map(call => {
            const callDate = new Date(call.date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
            const callHref = call.id ? `https://app.fireflies.ai/view/${call.id}` : 'https://app.fireflies.ai/';
            const items = call.action_items ?? [];
            const itemsHtml = items.length === 0
              ? ''
              : items.map(item => `<div class="ff-action"><span class="ff-dot"></span>${escHtml(item)}</div>`).join('');
            return `<div class="ff-item">
              <div class="ff-call"><a href="${escHtml(callHref)}" target="_blank" rel="noopener" class="card-hs-link">${escHtml(call.title)}</a> · ${escHtml(callDate)}</div>
              ${itemsHtml}
            </div>`;
          }).join('');

      return `
        <div class="card-section-label">Customer details</div>
        ${c ? `
          <div class="field-row">
            <div class="field-label">Primary contact</div>
            <div class="field-value">${escHtml(c.name ?? '')}</div>
            ${gmailUrl
              ? `<div class="field-email"><a href="${escHtml(gmailUrl)}" target="_blank" rel="noopener">${escHtml(c.email)}</a></div>`
              : ''}
          </div>
        ` : ''}
        ${rel ? `
          <div class="field-row">
            <div class="field-label">Last contact</div>
            <div class="field-date-rel">${escHtml(rel)}</div>
            <div class="field-date-abs">${escHtml(abs ?? '')}</div>
          </div>
        ` : ''}
        ${company.notes ? `
          <div class="field-row">
            <div class="field-label">Notes</div>
            <div class="field-notes">${escHtml(company.notes)}</div>
          </div>
        ` : ''}
        ${py ? `
          <div class="section-divider"></div>
          <div class="card-section-label">Support</div>
          <div class="field-row">
            <div class="field-label">Open tickets</div>
            <div class="field-value">
              <a href="${escHtml(`https://app.usepylon.com/accounts/${py.pylon_account_id}`)}" target="_blank" rel="noopener" class="card-hs-link">
                ${py.open_tickets_live ?? py.issues_last_30d.open} open
              </a>
              <span class="field-date-abs"> · ${py.issues_last_30d.total} in last 30d</span>
            </div>
          </div>
        ` : ''}
        <div class="section-divider"></div>
        <div class="card-section-label">Recent calls${(calls ?? []).length > 5 ? ` <span style="font-weight:400;color:#A19F9E">(5 of ${(calls ?? []).length})</span>` : ''}</div>
        ${ffHtml}
      `;
    }

    function renderCardRight(actions) {
      const open = actions.filter(a => !a.done);
      const done = actions.filter(a =>  a.done);
      const all  = [...open, ...done];

      const listHtml = all.length === 0
        ? '<p class="ff-empty">No actions yet.</p>'
        : all.map(action => `
            <div class="action-item${action.done ? ' action-item--done' : ''}">
              <button class="action-check${action.done ? ' done' : ''}"
                data-action-id="${escHtml(action.id)}"
                data-hubspot-id="${escHtml(action.hubspot_id)}"
                title="${action.done ? 'Mark open' : 'Mark done'}">
                ${action.done ? `<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,6 5,9 10,3"/></svg>` : ''}
              </button>
              <div class="action-name${action.done ? ' done' : ''}">${escHtml(action.name)}</div>
              <span class="priority-badge priority-${escHtml(action.priority)}">${escHtml(action.priority.charAt(0).toUpperCase() + action.priority.slice(1))}</span>
            </div>
          `).join('');

      const openCount = open.length;
      return `
        <div class="actions-header">
          <div>
            <div class="card-section-label" style="margin-bottom:0">CS actions</div>
            ${openCount > 0 ? `<div class="actions-open-count">${openCount} open</div>` : ''}
          </div>
        </div>
        ${listHtml}
      `;
    }

    function openCard(company) {
      const c        = isContactObj(company.contact) ? company.contact : null;
      const gmailUrl = c?.email
        ? `https://mail.google.com/mail/?view=cm&to=${encodeURIComponent(c.email)}`
        : null;
      const calls    = firefliesActionsMap.get(company.domain) ?? [];
      const actions  = allActions.filter(a => String(a.hubspot_id) === String(company.hubspot_id ?? ''));

      openCardId = String(company.hubspot_id ?? '');

      const overlay = document.getElementById('card-overlay');
      overlay.innerHTML = `
        <div class="card-modal" id="card-modal">
          <div class="card-modal-header">
            <div>
              <div class="card-modal-company">${escHtml(company.name ?? company.hubspot_id)}</div>
              <div class="card-modal-domain">${escHtml(company.domain ?? '')}${
                company.hubspot_url
                  ? ` · <a href="${safeHref(company.hubspot_url)}" target="_blank" rel="noopener" class="card-hs-link">HubSpot ↗</a>`
                  : ''
              }</div>
            </div>
            <button class="card-modal-close" id="card-close">×</button>
          </div>
          <div class="card-modal-body">
            <div class="card-modal-left">${renderCardLeft(company, c, gmailUrl, calls)}</div>
            <div class="card-modal-right">${renderCardRight(actions)}</div>
          </div>
        </div>
      `;
      overlay.classList.add('card-overlay--open');
      document.addEventListener('keydown', handleCardKeydown);
    }

    function closeCard() {
      const overlay = document.getElementById('card-overlay');
      overlay.classList.remove('card-overlay--open');
      overlay.innerHTML = '';
      openCardId = null;
      document.removeEventListener('keydown', handleCardKeydown);
    }

    function handleCardKeydown(e) {
      if (e.key === 'Escape') closeCard();
    }

    // ── Inline new task row ───────────────────────────────────

    function insertNewTaskRow() {
      const list = document.getElementById('tasks-list');
      if (list.querySelector('.task-row--new')) return;

      const row = document.createElement('div');
      row.className = 'task-row--new';
      row.innerHTML = `
        <div></div>
        <input class="task-new-input" placeholder="Type task name and press Enter…" maxlength="200" autocomplete="off">
        <div class="task-cell-placeholder">Med</div>
        <div class="task-cell-placeholder">No date</div>
        <div class="task-cell-placeholder">No client</div>
        <div></div>
      `;

      const hint = document.createElement('div');
      hint.className = 'task-new-hint';
      hint.innerHTML = '<kbd>↵ Enter</kbd> to save &nbsp;·&nbsp; <kbd>Esc</kbd> to cancel';

      list.insertBefore(hint, list.firstChild);
      list.insertBefore(row, hint);

      const input = row.querySelector('.task-new-input');
      input.focus();

      input.addEventListener('keydown', async e => {
        if (e.key === 'Escape') {
          row.remove();
          hint.remove();
          return;
        }
        if (e.key === 'Enter') {
          const name = input.value.trim();
          if (!name) return;
          input.disabled = true;
          try {
            const action = await createAction('', name, 'med');
            allActions.unshift(action);
            activeTab = 'todo';
            document.querySelectorAll('.tasks-tab').forEach(t =>
              t.classList.toggle('tasks-tab--active', t.dataset.tab === 'todo')
            );
          } catch {
            input.disabled = false;
            input.focus();
            return;
          }
          row.remove();
          hint.remove();
          render();
        }
      });
    }

    // ── API ──────────────────────────────────────────────────

    async function toggleDone(id) {
      const action = allActions.find(a => a.id === id);
      if (!action) return;
      const newDone = !action.done;
      const row = document.querySelector(`.task-row[data-id="${id}"]`);
      if (row && tabFor({ ...action, done: newDone ? 1 : 0 }) !== activeTab) {
        row.classList.add('task-row--exit');
        await new Promise(r => setTimeout(r, 200));
      }
      try {
        const res = await fetch(`${WORKER_URL}/actions/${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ done: newDone }),
        });
        if (!res.ok) throw new Error();
        action.done = newDone ? 1 : 0;
        render();
      } catch { /* silent */ }
    }

    async function deleteAction(id) {
      const row = document.querySelector(`.task-row[data-id="${id}"]`);
      if (row) { row.classList.add('task-row--exit'); await new Promise(r => setTimeout(r, 200)); }
      try {
        const res = await fetch(`${WORKER_URL}/actions/${id}`, { method: 'DELETE' });
        if (!res.ok) throw new Error();
        allActions = allActions.filter(a => a.id !== id);
        render();
      } catch { /* silent */ }
    }

    async function createAction(hubspot_id, name, priority) {
      const res = await fetch(`${WORKER_URL}/actions`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ hubspot_id: String(hubspot_id), name, priority }),
      });
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    // ── Events ───────────────────────────────────────────────

    document.getElementById('tasks-list').addEventListener('click', async e => {
      // Checkbox
      const check = e.target.closest('.task-check');
      if (check) { await toggleDone(check.dataset.id); return; }

      // Delete
      const del = e.target.closest('.task-delete');
      if (del) { await deleteAction(del.dataset.id); return; }

      // Due date inline edit
      const dueCell = e.target.closest('[data-due-id]');
      if (dueCell && !dueCell.querySelector('input')) {
        const id = dueCell.dataset.dueId;
        const action = allActions.find(a => a.id === id);
        const currentVal = action?.due_date ?? '';
        const input = document.createElement('input');
        input.type = 'date';
        input.className = 'task-due-input';
        if (currentVal) input.value = currentVal;
        dueCell.textContent = '';
        dueCell.appendChild(input);
        input.focus();

        async function saveDue() {
          const newDate = input.value || null;
          dueCell.textContent = newDate ? formatDate(newDate) : '—';
          if (action) action.due_date = newDate;
          if (newDate !== currentVal) {
            await fetch(`${WORKER_URL}/actions/${id}`, {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ due_date: newDate }),
            }).catch(() => {});
          }
          render();
        }

        input.addEventListener('change', saveDue);
        input.addEventListener('keydown', ev => {
          if (ev.key === 'Escape') { dueCell.textContent = currentVal ? formatDate(currentVal) : '—'; }
          if (ev.key === 'Enter')  { saveDue(); }
        });
        input.addEventListener('blur', saveDue);
        return;
      }

      // Client assign (no client yet)
      const assignBtn = e.target.closest('.task-client-assign');
      if (assignBtn) {
        const id = assignBtn.dataset.assignId;
        const action = allActions.find(a => a.id === id);
        const sel = document.createElement('select');
        sel.className = 'task-client-select';
        sel.innerHTML = '<option value="">Select client…</option>' +
          [...companyMap.entries()]
            .sort((a, b) => a[1].localeCompare(b[1]))
            .map(([hid, name]) => `<option value="${escHtml(hid)}">${escHtml(name)}</option>`)
            .join('');
        assignBtn.replaceWith(sel);
        sel.focus();

        async function saveClient() {
          const hid = sel.value;
          if (hid && action) {
            action.hubspot_id = hid;
            await fetch(`${WORKER_URL}/actions/${id}`, {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ hubspot_id: hid }),
            }).catch(() => {});
          }
          render();
        }

        sel.addEventListener('change', saveClient);
        sel.addEventListener('blur', () => render());
        return;
      }

      // Client name → card popup
      const cardBtn = e.target.closest('[data-open-card]');
      if (cardBtn) {
        const hid = cardBtn.dataset.openCard;
        const company = { hubspot_id: hid, name: companyMap.get(hid) ?? hid, domain: '' };
        openCard(company);
        return;
      }
    });

    document.getElementById('tasks-tabs').addEventListener('click', e => {
      const tab = e.target.closest('.tasks-tab');
      if (!tab) return;
      activeTab = tab.dataset.tab;
      document.querySelectorAll('.tasks-tab').forEach(t => t.classList.toggle('tasks-tab--active', t === tab));
      render();
    });

    document.getElementById('priority-pills').addEventListener('click', e => {
      const pill = e.target.closest('.priority-pill');
      if (!pill) return;
      activePriority = pill.dataset.priority;
      document.querySelectorAll('.priority-pill').forEach(p => p.classList.toggle('priority-pill--active', p === pill));
      render();
    });

    document.getElementById('type-pills').addEventListener('click', e => {
      const pill = e.target.closest('.crm-pill');
      if (!pill) return;
      activeType = pill.dataset.type;
      document.querySelectorAll('#type-pills .crm-pill').forEach(p =>
        p.classList.toggle('crm-pill--active', p === pill)
      );
      render();
    });

    document.getElementById('tasks-search').addEventListener('input', e => {
      activeSearch = e.target.value.trim();
      render();
    });

    // Account dropdown toggle
    document.getElementById('tasks-account-btn').addEventListener('click', e => {
      e.stopPropagation();
      document.getElementById('tasks-account-dropdown').classList.toggle('crm-strategic-dropdown--open');
    });
    document.getElementById('tasks-account-dropdown').addEventListener('click', e => {
      const opt = e.target.closest('.crm-strategic-opt');
      if (!opt) return;
      activeAccount = opt.dataset.account;
      document.querySelectorAll('#tasks-account-dropdown .crm-strategic-opt').forEach(o =>
        o.classList.toggle('crm-strategic-opt--active', o === opt)
      );
      const btn = document.getElementById('tasks-account-btn');
      btn.innerHTML = escHtml(opt.textContent) + ' <span class="crm-pill-chevron">▾</span>';
      document.getElementById('tasks-account-dropdown').classList.remove('crm-strategic-dropdown--open');
      render();
    });
    document.addEventListener('click', e => {
      if (!e.target.closest('#tasks-account-wrap')) {
        document.getElementById('tasks-account-dropdown')?.classList.remove('crm-strategic-dropdown--open');
      }
    });

    document.getElementById('new-task-btn').addEventListener('click', () => {
      activeTab = 'todo';
      document.querySelectorAll('.tasks-tab').forEach(t =>
        t.classList.toggle('tasks-tab--active', t.dataset.tab === 'todo')
      );
      render();
      insertNewTaskRow();
    });

    // Card overlay — close on backdrop / close button
    document.getElementById('card-overlay').addEventListener('click', e => {
      if (e.target === document.getElementById('card-overlay')) closeCard();
    });
    document.getElementById('card-overlay').addEventListener('click', e => {
      if (e.target.closest('#card-close')) closeCard();
    });

    // ── Animations ───────────────────────────────────────────
    // Self-contained block. Wraps render() and openModal() — does not modify
    // any other state. All animations guarded by prefers-reduced-motion.
    (function () {
      var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      // ── Animation 1 — task row stagger entrance ───────────────────────────
      // Wrap render() so that after the list is rebuilt the rows stagger in.
      // The existing CSS keyframe animation on .task-row is neutralised via JS
      // (animation: none) before anime takes over, keeping the two systems from
      // fighting each other. Capped at 20 rows.
      var _tasksFirstRender = true;
      var _originalRender = render;

      render = function () {
        _originalRender.apply(this, arguments);

        var rows = Array.prototype.slice.call(
          document.querySelectorAll('#tasks-list .task-row'),
          0, 20
        );

        if (rows.length === 0) { _tasksFirstRender = false; return; }

        if (!reduced) {
          // Cancel the CSS keyframe so anime controls the entrance exclusively
          rows.forEach(function (row) {
            row.style.animation = 'none';
            row.style.opacity   = '0';
            row.style.transform = 'translateY(12px)';
          });

          anime({
            targets: rows,
            opacity:    [0, 1],
            translateY: [12, 0],
            duration:   350,
            easing:     'cubicBezier(.4, 0, .2, 1)',
            delay:      anime.stagger(40),
          });
        } else {
          // Reduced motion: just make rows visible immediately
          rows.forEach(function (row) {
            row.style.animation = 'none';
            row.style.opacity   = '1';
            row.style.transform = 'none';
          });
        }

        _tasksFirstRender = false;
      };

      // ── Animation 2 — filter / tab pulse ─────────────────────────────────
      // Dims existing rows before the filter re-renders them. Uses capture
      // phase so it fires before the existing listeners that call render().
      // Skipped on the very first render (no rows exist yet).
      function pulseRows() {
        if (_tasksFirstRender) return;
        if (reduced) return;
        var rows = document.querySelectorAll('#tasks-list .task-row');
        if (rows.length === 0) return;
        anime({
          targets:  rows,
          opacity:  [1, 0.3, 1],
          duration: 250,
          easing:   'cubicBezier(.4, 0, .2, 1)',
        });
      }

      document.getElementById('tasks-tabs').addEventListener('click', function (e) {
        if (e.target.closest('.tasks-tab')) pulseRows();
      }, true);

      document.getElementById('priority-pills').addEventListener('click', function (e) {
        if (e.target.closest('.priority-pill')) pulseRows();
      }, true);

      var _cfEl = document.getElementById('tasks-account-dropdown');
      if (_cfEl) _cfEl.addEventListener('change', pulseRows, true);
    }());

    // ── Load ─────────────────────────────────────────────────

    fetch('./data/hubspot.json').then(r => r.json()).then(companies => {
      companyMap = new Map(companies.map(c => [String(c.hubspot_id), c.name ?? String(c.hubspot_id)]));
      typeMap    = new Map(companies.map(c => [String(c.hubspot_id), c.type ?? '']));
      // Populate account dropdown
      const dropdown = document.getElementById('tasks-account-dropdown');
      if (dropdown) {
        const sorted = [...companies].sort((a, b) => (a.name ?? '').localeCompare(b.name ?? ''));
        sorted.forEach(c => {
          const btn = document.createElement('button');
          btn.className = 'crm-strategic-opt';
          btn.dataset.account = String(c.hubspot_id);
          btn.textContent = c.name ?? String(c.hubspot_id);
          dropdown.appendChild(btn);
        });
      }
    }).catch(() => {});

    fetch(`${WORKER_URL}/actions`, { signal: AbortSignal.timeout(8000) })
      .then(r => r.json())
      .then(actions => {
        if (!Array.isArray(actions)) throw new Error();
        allActions = actions; render();
      })
      .catch(() => {
        document.getElementById('tasks-list').innerHTML =
          '<div class="tasks-empty tasks-error">Tasks couldn\'t load. Try refreshing.</div>';
      });
  </script>
</body>
</html>
