<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer List — CS-Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <div class="site-header-inner">
      <span class="site-logo">
        <svg width="20" height="20" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg"><g clip-path="url(#so-logo-clip)"><path d="M85.334 103.111H170.667V53.333H129.906C105.289 53.333 85.334 53.333 85.334 79.4353V103.111Z" fill="url(#so-logo-g1)"/><path d="M170.667 152.888H85.334V202.665H126.095C150.712 202.665 170.667 202.665 170.667 176.563V152.888Z" fill="url(#so-logo-g2)"/><path d="M170.667 53.333H85.6178H0L4.17922e-06 152.889H85.6178V103.12L85.6059 101.011C85.4556 74.7235 106.724 53.333 133.012 53.333H170.667Z" fill="#00AF66"/><path d="M85.334 202.666H170.383H256.001V103.11H170.383V152.879L170.395 154.988C170.545 181.275 149.276 202.666 122.988 202.666H85.334Z" fill="#00AF66"/></g><defs><linearGradient id="so-logo-g1" x1="170.667" y1="78.2219" x2="85.334" y2="78.2219" gradientUnits="userSpaceOnUse"><stop stop-color="#00AF66"/><stop offset="1" stop-color="#285C4D"/></linearGradient><linearGradient id="so-logo-g2" x1="85.334" y1="177.777" x2="170.667" y2="177.777" gradientUnits="userSpaceOnUse"><stop stop-color="#00AF66"/><stop offset="1" stop-color="#285C4D"/></linearGradient><clipPath id="so-logo-clip"><rect width="256" height="149.333" fill="white" transform="translate(0 53.333)"/></clipPath></defs></svg>
        CS-Hub
      </span>
      <nav class="site-nav">
        <a href="dashboard.html" class="site-nav-link">Dashboard</a>
        <a href="crm.html" class="site-nav-link site-nav-link--active">Customer List</a>
        <a href="tasks.html" class="site-nav-link">CS Tasks</a>
        <a href="connectors.html" class="site-nav-link">Connectors</a>
      </nav>
    </div>
  </header>

  <main class="page-main page-main--crm">

    <div class="crm-toolbar">
      <div class="crm-toolbar-left">
        <div class="crm-search-wrap">
          <svg class="crm-search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="6.5" cy="6.5" r="4"/>
            <line x1="9.5" y1="9.5" x2="13.5" y2="13.5"/>
          </svg>
          <input id="crm-search" class="crm-search" type="search" placeholder="Search customers…" autocomplete="off">
        </div>
        <div class="crm-type-pills" id="crm-type-pills">
          <button class="crm-pill crm-pill--active" data-type="">All</button>
          <button class="crm-pill" data-type="Customer - PLG">PLG</button>
          <button class="crm-pill" data-type="Customer - SLG">SLG</button>
          <button class="crm-pill" data-type="Customer">Customers</button>
        </div>
        <div class="crm-strategic-wrap" id="crm-strategic-wrap">
          <button class="crm-pill" id="crm-strategic-btn">
            All accounts <span class="crm-pill-chevron">▾</span>
          </button>
          <div class="crm-strategic-dropdown" id="crm-strategic-dropdown">
            <button class="crm-strategic-opt crm-strategic-opt--active" data-strategic="">All accounts</button>
            <button class="crm-strategic-opt" data-strategic="Yes - Agentic">Agentic</button>
            <button class="crm-strategic-opt" data-strategic="Yes - Non Agentic">Non-agentic</button>
            <button class="crm-strategic-opt" data-strategic="Managed Service Candidate">Managed svc</button>
            <button class="crm-strategic-opt" data-strategic="No">Non-strategic</button>
          </div>
        </div>
      </div>
      <div class="crm-toolbar-right">
        <span id="crm-count" class="crm-count"></span>
        <button id="crm-show-cols-btn" class="crm-layout-btn" style="display:none">Show columns</button>
        <button id="crm-reset-layout" class="crm-layout-btn crm-layout-btn--reset">Reset layout</button>
      </div>
    </div>

    <div class="crm-card">
    <div id="crm-table-wrap" class="crm-table-wrap">
      <table class="crm-table" id="crm-table">
        <colgroup id="crm-colgroup"></colgroup>
        <thead></thead>
        <tbody id="crm-tbody">
          <tr><td colspan="12" class="crm-placeholder" style="text-align:center;padding:32px">Loading…</td></tr>
        </tbody>
      </table>
    </div>
      <div class="crm-footer"><span class="crm-footer-count" id="crm-footer-count"></span></div>
    </div>

  </main>

  <div id="crm-bulk-bar" class="crm-bulk-bar" style="display:none">
    <span class="crm-bulk-count" id="crm-bulk-count">0 rows selected</span>
    <span style="color:#A19F9E;font-size:12px;">Bulk update health:</span>
    <select id="crm-bulk-health" class="crm-bulk-health-sel">
      <option value="risk">🔴 Risk</option>
      <option value="fair">🟠 Fair</option>
      <option value="good">🟡 Good</option>
      <option value="excellent">🟢 Excellent</option>
      <option value="">— Clear health —</option>
    </select>
    <button id="crm-bulk-apply" class="crm-bulk-apply-btn">Apply</button>
    <button id="crm-bulk-clear" class="crm-bulk-clear-btn" style="margin-left:auto;">Clear selection</button>
  </div>

  <div id="card-overlay" class="card-overlay"></div>
  <div id="inline-add-popover" class="inline-add-popover"></div>
  <div id="col-menu" class="col-menu"></div>
  <div id="health-menu" class="col-menu"></div>

  <script>
    // --- Constants ---
    const WORKER_URL   = 'https://stack-plg-actions.charlie-9e7.workers.dev';
    const PLACEHOLDER_CELL = '<td></td>';

    const DEFAULT_COL_ORDER = [
      'name', 'health', 'contact', 'notes', 'local_notes', 'last_contact',
      'account', 'integrations', 'clicks', 'api_requests',
      'tickets_total', 'open_tickets', 'last_call',
    ];

    // Default widths (px) — sum ~1385px, fills a 1400px container
    const DEFAULT_COL_WIDTHS = {
      name:          300,
      health:         90,
      contact:       160,
      notes:         170,
      local_notes:   160,
      last_contact:  105,
      account:       120,
      integrations:   95,
      clicks:         75,
      api_requests:   95,
      tickets_total:  95,
      open_tickets:   95,
      last_call:     130,
    };

    function thHtml(col, label) {
      const pinned = frozenCols.has(col);
      const cls = ['crm-th--clickable', pinned ? 'crm-th--frozen' : ''].filter(Boolean).join(' ');
      return `<th data-col="${col}" draggable="${!pinned}" class="${cls}">` +
        `${label}<button class="crm-th-menu-btn" data-col="${col}" aria-label="Column options">⋮</button><div class="crm-resize-handle"></div></th>`;
    }

    const COL_HEADERS = {
      name:          () => thHtml('name', 'Name'),
      health:        () => thHtml('health', 'Health'),
      contact:       () => thHtml('contact', 'Primary contact'),
      notes:         () => thHtml('notes', 'HubSpot Notes'),
      local_notes:   () => thHtml('local_notes', 'Notes'),
      last_contact:  () => thHtml('last_contact', 'Last contact'),
      account:       () => thHtml('account', 'Pylon account'),
      integrations:  () => thHtml('integrations', 'Linked accounts'),
      clicks:        () => thHtml('clicks', 'Clicks'),
      api_requests:  () => thHtml('api_requests', 'API requests'),
      tickets_total: () => thHtml('tickets_total', 'Tickets (30d)'),
      open_tickets:  () => thHtml('open_tickets', 'Open tickets'),
      last_call:     () => thHtml('last_call', 'Most recent call'),
    };

    const CELLS = {
      name: company => {
        const display    = company.name ?? company.hubspot_id;
        const href       = safeHref(company.hubspot_url);
        const hid        = escHtml(String(company.hubspot_id ?? ''));
        const badge      = typeBadge(company.type);

        const c          = isContactObj(company.contact) ? company.contact : null;
        const mailtoHref = c?.email ? `superhuman://compose?to=${encodeURIComponent(c.email)}` : null;
        const pylonEntry = company.hubspot_id ? pylonMap.get(String(company.hubspot_id)) : null;
        const pylonHref  = pylonEntry ? escHtml(`https://app.usepylon.com/accounts/${pylonEntry.pylon_account_id}`) : null;
        const quickLinks = [
          href !== '#' ? `<a href="${href}" class="crm-row-action" target="_blank" rel="noopener" title="Open in HubSpot"><svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="2" width="14" height="12" rx="2"/><path d="M1 6h14"/><path d="M6 2v4"/><path d="M10 2v4"/></svg></a>` : '',
          mailtoHref    ? `<a href="${mailtoHref}" class="crm-row-action" title="Send email"><svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="14" height="10" rx="1.5"/><path d="M1 4l7 5 7-5"/></svg></a>` : '',
          pylonHref     ? `<a href="${pylonHref}" class="crm-row-action" target="_blank" rel="noopener" title="Open in Pylon"><svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="6"/><path d="M6 6h3.5a1.5 1.5 0 010 3H6v3"/></svg></a>` : '',
        ].filter(Boolean).join('');
        return `<td class="crm-name-cell">
          <div class="crm-name-inner">
            <a href="${href}" target="_blank" rel="noopener">${escHtml(display)}</a>${badge}
            <button class="card-open-btn" data-hubspot-id="${hid}" aria-label="Open card">⊞</button>
            <button class="inline-task-btn" data-hubspot-id="${hid}" aria-label="Add task">+</button>
            <div class="crm-row-actions">${quickLinks}</div>
          </div>
        </td>`;
      },
      contact: company => {
        const c = isContactObj(company.contact) ? company.contact : null;
        if (!c || !c.name) return PLACEHOLDER_CELL;
        const name = escHtml(c.name);
        // Build HubSpot contact URL if we have _id
        let contactHref = null;
        if (c._id && company.hubspot_url) {
          const portalMatch = company.hubspot_url.match(/\/contacts\/(\d+)\//);
          if (portalMatch) {
            contactHref = `https://app-eu1.hubspot.com/contacts/${portalMatch[1]}/record/0-1/${c._id}`;
          }
        }
        const emailBtn = c.email
          ? `<a href="superhuman://compose?to=${encodeURIComponent(c.email)}" class="crm-email-btn" title="Email ${escHtml(c.name)}" onclick="event.stopPropagation()"><svg viewBox="0 0 14 14" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="2.5" width="12" height="9" rx="1.5"/><path d="M1 3.5l6 4.5 6-4.5"/></svg></a>`
          : '';
        const nameEl = contactHref
          ? `<a href="${escHtml(contactHref)}" target="_blank" rel="noopener" class="crm-contact-name-link">${name}</a>`
          : `<span class="crm-contact-name-link">${name}</span>`;
        return `<td><div class="crm-contact-cell">${nameEl}${emailBtn}</div></td>`;
      },
      notes: company => {
        const n = company.notes;
        if (!n) return PLACEHOLDER_CELL;
        const truncated = n.length > 80 ? n.slice(0, 80) + '…' : n;
        return `<td class="crm-notes" data-full-notes="${escHtml(n)}">${escHtml(truncated)}</td>`;
      },
      local_notes: company => {
        const rawHid = String(company.hubspot_id ?? '');
        const note   = notesMap.get(rawHid) ?? '';
        const display = escHtml(note.length > 60 ? note.slice(0, 60) + '…' : note);
        return `<td class="crm-local-notes-cell crm-local-notes-cell--clickable" data-hubspot-id="${escHtml(rawHid)}">` +
          `${display || '<span class="crm-placeholder">Add note…</span>'}` +
          `</td>`;
      },
      health: company => {
        const hid    = String(company.hubspot_id ?? '');
        const status = healthMap.get(hid) ?? null;
        const cfg = { risk: 'Risk', fair: 'Fair', good: 'Good', excellent: 'Excellent' };
        const label = status ? cfg[status] : null;
        const inner = label
          ? `<span class="health-badge health--${escHtml(status)}"><span class="health-dot"></span>${label}</span>`
          : `<span class="crm-placeholder">Set health</span>`;
        return `<td class="crm-health-cell crm-health-cell--clickable" data-hubspot-id="${escHtml(hid)}">${inner}</td>`;
      },
      last_contact: company => {
        const rel = relativeTime(company.last_contact);
        if (!rel) return PLACEHOLDER_CELL;
        const abs = new Date(company.last_contact).toLocaleDateString('en-GB', {
          day: 'numeric', month: 'short', year: 'numeric',
        });
        const activityUrl = company.hubspot_url ? safeHref(company.hubspot_url) : null;
        return activityUrl
          ? `<td class="crm-date" title="${escHtml(abs)}"><a href="${activityUrl}" target="_blank" rel="noopener">${escHtml(rel)}</a></td>`
          : `<td class="crm-date" title="${escHtml(abs)}">${escHtml(rel)}</td>`;
      },
      account: company => {
        const py = company.hubspot_id ? pylonMap.get(String(company.hubspot_id)) : null;
        if (!py) return PLACEHOLDER_CELL;
        const pylonUrl = `https://app.usepylon.com/accounts/${py.pylon_account_id}`;
        return `<td><a href="${escHtml(pylonUrl)}" target="_blank" rel="noopener">${escHtml(py.name)}</a></td>`;
      },
      integrations: company => {
        const ph = posthogMap.get(normName(company.name));
        return ph != null
          ? `<td class="crm-num">${ph.linked_accounts.toLocaleString()}</td>`
          : PLACEHOLDER_CELL;
      },
      clicks: company => {
        const ph = posthogMap.get(normName(company.name));
        return ph != null
          ? `<td class="crm-num">${ph.click_interactions.toLocaleString()}</td>`
          : PLACEHOLDER_CELL;
      },
      api_requests:  () => PLACEHOLDER_CELL,
      tickets_total: company => {
        const py = company.hubspot_id ? pylonMap.get(String(company.hubspot_id)) : null;
        return py ? `<td class="crm-num">${py.issues_last_30d.total}</td>` : PLACEHOLDER_CELL;
      },
      open_tickets: company => {
        const py = company.hubspot_id ? pylonMap.get(String(company.hubspot_id)) : null;
        if (!py) return PLACEHOLDER_CELL;
        const count = py.open_tickets_live ?? py.issues_last_30d.open;
        const pylonUrl = escHtml(`https://app.usepylon.com/accounts/${py.pylon_account_id}`);
        return `<td class="crm-num"><a href="${pylonUrl}" target="_blank" rel="noopener">${count}</a></td>`;
      },
      last_call: company => {
        const ff = company.domain ? firefliesMap.get(company.domain) : null;
        if (!ff) return PLACEHOLDER_CELL;
        const dateStr = new Date(ff.date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
        const href = ff.id ? escHtml(`https://app.fireflies.ai/view/${ff.id}`) : 'https://app.fireflies.ai/';
        return `<td><a href="${href}" target="_blank" rel="noopener" class="crm-call-link" title="${escHtml(dateStr)}">${escHtml(ff.title)}</a></td>`;
      },
    };

    // --- State ---
    let allRows             = [];
    let posthogMap          = new Map();
    let firefliesMap        = new Map();  // domain → most-recent call (for Last call column)
    let firefliesActionsMap = new Map();  // domain → all calls sorted desc (for card)
    let pylonMap            = new Map();  // hubspot_id → pylon account
    let actionsMap          = new Map();  // hubspot_id (string) → action[]
    let healthMap           = new Map();  // hubspot_id (string) → status string
    let notesMap            = new Map();  // hubspot_id (string) → note body string
    let selectedRows        = new Set();  // hubspot_ids of checked rows
    let openCardId          = null;       // hubspot_id of the open card, or null
    let typeFilter = '';
    let strategicFilter = '';
    let sortKey  = 'name';
    let sortDir  = 'asc';
    let clickCounts = {};
    let colOrder   = loadColOrder();
    let colWidths  = loadColWidths();
    let frozenCols = loadFrozenCols();
    let hiddenCols = loadHiddenCols();

    // Local notes: per-company freetext stored in localStorage
    let localNotes = (() => {
      try { return JSON.parse(localStorage.getItem('plg_crm_local_notes') ?? 'null') ?? {}; }
      catch { return {}; }
    })();
    function saveLocalNotes() {
      localStorage.setItem('plg_crm_local_notes', JSON.stringify(localNotes));
    }

    // --- Helpers ---

    function escHtml(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function safeHref(url) {
      if (!url) return '#';
      try {
        const u = new URL(url, location.href);
        return (u.protocol === 'https:' || u.protocol === 'http:') ? escHtml(url) : '#';
      } catch { return '#'; }
    }

    function isContactObj(c) {
      return c !== null && typeof c === 'object' && !Array.isArray(c);
    }

    function normName(s) {
      return (s ?? '').toLowerCase().replace(/[^a-z0-9]/g, '');
    }

    function typeBadge(type) {
      if (!type) return '';
      if (type === 'Customer - PLG') return '<span class="crm-type-badge crm-type-badge--plg">PLG</span>';
      if (type === 'Customer - SLG') return '<span class="crm-type-badge crm-type-badge--slg">SLG</span>';
      return '<span class="crm-type-badge crm-type-badge--cust">Cust</span>';
    }

    function contactSortValue(company) {
      const c = isContactObj(company.contact) ? company.contact : null;
      if (!c || !c.name) return '\uffff';
      const parts = c.name.trim().split(/\s+/);
      const last  = parts.at(-1) ?? '';
      const first = parts.slice(0, -1).join(' ');
      return (last + (first ? ' ' + first : '')).toLowerCase();
    }

    function loadColOrder() {
      try {
        const parsed = JSON.parse(localStorage.getItem('plg_crm_col_order'));
        const valid =
          Array.isArray(parsed) &&
          parsed.length === DEFAULT_COL_ORDER.length &&
          new Set(parsed).size === DEFAULT_COL_ORDER.length &&
          DEFAULT_COL_ORDER.every(k => parsed.includes(k));
        return valid ? parsed : [...DEFAULT_COL_ORDER];
      } catch {
        return [...DEFAULT_COL_ORDER];
      }
    }

    function loadColWidths() {
      try {
        const parsed = JSON.parse(localStorage.getItem('plg_crm_col_widths') ?? 'null');
        if (parsed && typeof parsed === 'object') {
          // Migrate: if saved name width is the old default (150), clear it so new default (300) applies
          if (parsed.name === 150) delete parsed.name;
          return { ...DEFAULT_COL_WIDTHS, ...parsed };
        }
        return { ...DEFAULT_COL_WIDTHS };
      } catch {
        return { ...DEFAULT_COL_WIDTHS };
      }
    }

    function saveColWidths() {
      localStorage.setItem('plg_crm_col_widths', JSON.stringify(colWidths));
    }

    function showLayoutSavedToast() {
      let toast = document.getElementById('layout-toast');
      if (!toast) {
        toast = document.createElement('div');
        toast.id = 'layout-toast';
        toast.style.cssText = 'position:fixed;bottom:20px;right:20px;background:#222121;color:#fff;font-size:12px;padding:8px 14px;border-radius:8px;z-index:9999;opacity:0;transition:opacity 0.2s;pointer-events:none';
        toast.textContent = 'Layout saved';
        document.body.appendChild(toast);
      }
      clearTimeout(toast._timer);
      toast.style.opacity = '1';
      toast._timer = setTimeout(() => { toast.style.opacity = '0'; }, 1500);
    }

    function loadFrozenCols() {
      try {
        const raw = localStorage.getItem('plg_crm_frozen');
        if (raw === null) return new Set(['name']); // first visit: freeze name by default
        const parsed = JSON.parse(raw);
        return new Set(Array.isArray(parsed) ? parsed.filter(c => DEFAULT_COL_ORDER.includes(c)) : ['name']);
      } catch {
        return new Set(['name']);
      }
    }

    function saveFrozenCols() {
      localStorage.setItem('plg_crm_frozen', JSON.stringify([...frozenCols]));
    }

    function loadHiddenCols() {
      try {
        const raw = localStorage.getItem('plg_crm_hidden');
        const parsed = JSON.parse(raw ?? '[]');
        return new Set(Array.isArray(parsed) ? parsed.filter(c => DEFAULT_COL_ORDER.includes(c)) : []);
      } catch { return new Set(); }
    }

    function saveHiddenCols() {
      localStorage.setItem('plg_crm_hidden', JSON.stringify([...hiddenCols]));
    }

    // Frozen columns first, then the rest in colOrder sequence
    function getEffectiveOrder() {
      const frozen = colOrder.filter(c => frozenCols.has(c) && !hiddenCols.has(c));
      const rest   = colOrder.filter(c => !frozenCols.has(c) && !hiddenCols.has(c));
      return [...frozen, ...rest];
    }

    function applyColWidths() {
      const cg = document.getElementById('crm-colgroup');
      if (!cg) return;
      const order = getEffectiveOrder();
      cg.innerHTML = `<col style="width:36px">` + order.map(col =>
        `<col data-col="${col}" style="width:${colWidths[col] ?? DEFAULT_COL_WIDTHS[col]}px">`
      ).join('');
    }

    function applyFrozenStyles() {
      const table = document.querySelector('.crm-table');
      const thead = table.querySelector('thead');
      const tbody = table.querySelector('tbody');
      const order = getEffectiveOrder();
      let offset = 0;
      order.forEach((col, colIdx) => {
        const frozen = frozenCols.has(col);
        const w = colWidths[col] ?? DEFAULT_COL_WIDTHS[col];
        if (frozen) {
          const th = thead.querySelector(`th[data-col="${col}"]`);
          if (th) { th.style.position = 'sticky'; th.style.left = offset + 'px'; th.style.zIndex = '5'; }
          tbody.querySelectorAll('tr').forEach(row => {
            const td = row.cells[colIdx];
            if (td) { td.style.position = 'sticky'; td.style.left = offset + 'px'; td.style.zIndex = '1'; td.classList.add('crm-td--frozen'); }
          });
          offset += w;
        }
      });
    }

    function relativeTime(iso) {
      if (!iso) return null;
      const diff = Date.now() - new Date(iso).getTime();
      if (isNaN(diff) || diff < 0) return 'Today';
      const days = Math.floor(diff / 86400000);
      if (days === 0)  return 'Today';
      if (days === 1)  return 'Yesterday';
      if (days < 7)    return `${days} days ago`;
      const weeks = Math.floor(days / 7);
      if (weeks < 8)   return `${weeks} ${weeks === 1 ? 'week' : 'weeks'} ago`;
      const months = Math.floor(days / 30);
      if (months < 2)  return `${weeks} weeks ago`;
      if (months < 24) return `${months} months ago`;
      const years = Math.floor(days / 365);
      return `${years} ${years === 1 ? 'year' : 'years'} ago`;
    }

    function searchMatch(company, query) {
      const q = query.toLowerCase();
      const c = isContactObj(company.contact) ? company.contact : null;
      return (
        (company.name   ?? '').toLowerCase().includes(q) ||
        (company.domain ?? '').toLowerCase().includes(q) ||
        (c?.name  ?? '').toLowerCase().includes(q) ||
        (c?.email ?? '').toLowerCase().includes(q) ||
        (company.notes ?? '').toLowerCase().includes(q) ||
        (localNotes[String(company.hubspot_id)] ?? '').toLowerCase().includes(q)
      );
    }

    function lastContactSortValue(company, dir) {
      if (!company.last_contact) return dir === 'asc' ? Infinity : -Infinity;
      const t = new Date(company.last_contact).getTime();
      return isNaN(t) ? (dir === 'asc' ? Infinity : -Infinity) : t;
    }

    function sortedRows(rows) {
      return [...rows].sort((a, b) => {
        const dir = sortDir === 'asc' ? 1 : -1;
        switch (sortKey) {
          case 'contact':
            return dir * contactSortValue(a).localeCompare(contactSortValue(b));
          case 'notes': {
            if (!a.notes && !b.notes) return 0;
            if (!a.notes) return 1; if (!b.notes) return -1;
            return dir * a.notes.toLowerCase().localeCompare(b.notes.toLowerCase());
          }
          case 'last_contact': {
            const va = lastContactSortValue(a, sortDir), vb = lastContactSortValue(b, sortDir);
            return va === vb ? 0 : (va > vb ? dir : -dir);
          }
          case 'account': {
            const na = (pylonMap.get(String(a.hubspot_id))?.name ?? '').toLowerCase();
            const nb = (pylonMap.get(String(b.hubspot_id))?.name ?? '').toLowerCase();
            return dir * na.localeCompare(nb);
          }
          case 'integrations': {
            const ia = posthogMap.get(normName(a.name))?.linked_accounts ?? -1;
            const ib = posthogMap.get(normName(b.name))?.linked_accounts ?? -1;
            return dir * (ia - ib);
          }
          case 'clicks': {
            const ca = posthogMap.get(normName(a.name))?.click_interactions ?? -1;
            const cb = posthogMap.get(normName(b.name))?.click_interactions ?? -1;
            return dir * (ca - cb);
          }
          case 'tickets_total': {
            const ta = pylonMap.get(String(a.hubspot_id))?.issues_last_30d.total ?? -1;
            const tb = pylonMap.get(String(b.hubspot_id))?.issues_last_30d.total ?? -1;
            return dir * (ta - tb);
          }
          case 'open_tickets': {
            const pa = pylonMap.get(String(a.hubspot_id));
            const pb = pylonMap.get(String(b.hubspot_id));
            const oa = pa ? (pa.open_tickets_live ?? pa.issues_last_30d.open) : -1;
            const ob = pb ? (pb.open_tickets_live ?? pb.issues_last_30d.open) : -1;
            return dir * (oa - ob);
          }
          case 'last_call': {
            const da = a.domain ? (firefliesMap.get(a.domain)?.date ?? '') : '';
            const db = b.domain ? (firefliesMap.get(b.domain)?.date ?? '') : '';
            if (!da && !db) return 0;
            if (!da) return 1; if (!db) return -1;
            return dir * da.localeCompare(db);
          }
          default:
            return dir * (a.name ?? '').localeCompare(b.name ?? '');
        }
      });
    }

    // --- Action CRUD ---

    async function createAction(hubspot_id, name, priority) {
      try {
        const res = await fetch(`${WORKER_URL}/actions`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ hubspot_id: String(hubspot_id), name, priority }),
        });
        if (!res.ok) throw new Error(await res.text());
        const action = await res.json();
        const list = actionsMap.get(String(hubspot_id)) ?? [];
        actionsMap.set(String(hubspot_id), [...list, action]);
        return action;
      } catch (e) {
        console.error('[actions] create failed:', e);
        return null;
      }
    }

    async function toggleAction(id, hubspot_id, currentDone) {
      try {
        const res = await fetch(`${WORKER_URL}/actions/${encodeURIComponent(id)}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ done: currentDone ? 0 : 1 }),
        });
        if (!res.ok) throw new Error(await res.text());
        const updated = await res.json();
        const list = actionsMap.get(String(hubspot_id)) ?? [];
        actionsMap.set(String(hubspot_id), list.map(a => a.id === id ? updated : a));
        return updated;
      } catch (e) {
        console.error('[actions] toggle failed:', e);
        return null;
      }
    }

    async function deleteAction(id, hubspot_id) {
      try {
        const res = await fetch(`${WORKER_URL}/actions/${encodeURIComponent(id)}`, {
          method: 'DELETE',
        });
        if (!res.ok && res.status !== 204) throw new Error(await res.text());
        const list = actionsMap.get(String(hubspot_id)) ?? [];
        actionsMap.set(String(hubspot_id), list.filter(a => a.id !== id));
        return true;
      } catch (e) {
        console.error('[actions] delete failed:', e);
        return false;
      }
    }

    function showCardError(msg) {
      const right = document.querySelector('.card-modal-right');
      if (!right) return;
      const err = document.createElement('div');
      err.style.cssText = 'font-size:12px;color:#C43E3E;padding:4px 0;';
      err.textContent = msg;
      right.prepend(err);
      setTimeout(() => err.remove(), 3000);

    const HEALTH_OPTIONS = [
      { value: '',          label: '— No status —' },
      { value: 'risk',      label: '🔴 Risk'       },

    // --- Render ---

    function render() {
      const table      = document.querySelector('.crm-table');
      const thead      = table.querySelector('thead');
      const tbody      = table.querySelector('tbody');
      const query    = document.getElementById('crm-search').value.trim();
      const filtered = allRows.filter(c =>
        (!query || searchMatch(c, query)) &&
        (!typeFilter || c.type === typeFilter) &&
        (!strategicFilter || c.strategic_account === strategicFilter)
      );
      const display    = sortedRows(filtered);

      const effectiveOrder = getEffectiveOrder();
      const allHids = display.map(c => String(c.hubspot_id ?? ''));
      const allSelected = allHids.length > 0 && allHids.every(h => selectedRows.has(h));
      const selectAllCb = `<th class="crm-th--checkbox" style="width:36px;flex-shrink:0"><input type="checkbox" class="crm-select-all" ${allSelected ? 'checked' : ''} style="accent-color:#00AF66;width:14px;height:14px;"></th>`;
      thead.innerHTML = `<tr>${selectAllCb}${effectiveOrder.map(col => COL_HEADERS[col]()).join('')}</tr>`;

      thead.querySelectorAll('th[data-col]').forEach(th => th.removeAttribute('aria-sort'));
      const activeTh = thead.querySelector(`th[data-col="${sortKey}"]`);
      if (activeTh) activeTh.setAttribute('aria-sort', sortDir === 'asc' ? 'ascending' : 'descending');

      tbody.innerHTML = display.map(company => {
        const hid = String(company.hubspot_id ?? '');
        const checked = selectedRows.has(hid);
        const rowCb   = `<td class="crm-td--checkbox" style="width:36px;text-align:center;"><input type="checkbox" class="crm-row-cb" data-hubspot-id="${escHtml(hid)}" ${checked ? 'checked' : ''} style="accent-color:#00AF66;width:14px;height:14px;"></td>`;
        const mainRow = `<tr data-hubspot-id="${escHtml(hid)}"${checked ? ' class="crm-row--selected"' : ''}>${rowCb}${effectiveOrder.map(col => CELLS[col](company)).join('')}</tr>`;
        return mainRow;
      }).join('');

      applyColWidths();
      applyFrozenStyles();

      const total = allRows.length;
      const shown = display.length;
      const countText = (query || typeFilter || strategicFilter) ? `Showing ${shown} of ${total} customers` : `${total} customers`;
      document.getElementById('crm-count').textContent = countText;
      const showColsBtn = document.getElementById('crm-show-cols-btn');
      if (showColsBtn) showColsBtn.style.display = hiddenCols.size > 0 ? '' : 'none';
      const footerEl = document.getElementById('crm-footer-count');
      if (footerEl) footerEl.textContent = countText;

      const bar = document.getElementById('crm-bulk-bar');
      const count = selectedRows.size;
      bar.style.display = count > 0 ? 'flex' : 'none';
      if (count > 0) {
        document.getElementById('crm-bulk-count').textContent = `${count} row${count === 1 ? '' : 's'} selected`;
      }
    }


    // --- Init ---

    Promise.all([
      fetch('./data/hubspot.json').then(r => { if (!r.ok) throw new Error(r.status); return r.json(); }),
      fetch('./data/posthog.json').then(r => r.ok ? r.json() : []).catch(() => []),
      fetch('./data/fireflies.json').then(r => r.ok ? r.json() : []).catch(() => []),
      fetch('./data/pylon.json').then(r => r.ok ? r.json() : []).catch(() => []),
      fetch(`${WORKER_URL}/actions`, { signal: AbortSignal.timeout(5000) }).then(r => r.ok ? r.json() : []).catch(() => []),
      fetch(`${WORKER_URL}/health`, { signal: AbortSignal.timeout(5000) }).then(r => r.ok ? r.json() : []).catch(() => []),
      fetch(`${WORKER_URL}/notes`, { signal: AbortSignal.timeout(5000) }).then(r => r.ok ? r.json() : []).catch(() => []),
    ]).then(([hubspot, posthog, fireflies, pylon, actions, healthData, notesData]) => {
      const posthogOrgs = Array.isArray(posthog) ? posthog : (posthog?.orgs ?? []);
      posthogMap = new Map(posthogOrgs.map(r => [normName(r.org_name), r]));
      pylonMap   = new Map(pylon.map(r => [String(r.hubspot_id), r]));

      // firefliesMap: domain → most-recent call (used by Last call column)
      firefliesMap = new Map();
      for (const entry of fireflies) {
        if (!firefliesMap.has(entry.domain) || entry.date > firefliesMap.get(entry.domain).date) {
          firefliesMap.set(entry.domain, entry);
        }
      }

      // firefliesActionsMap: domain → all calls sorted most-recent first (used by card)
      firefliesActionsMap = new Map();
      for (const entry of fireflies) {
        if (!firefliesActionsMap.has(entry.domain)) firefliesActionsMap.set(entry.domain, []);
        firefliesActionsMap.get(entry.domain).push(entry);
      }
      for (const [, calls] of firefliesActionsMap) {
        calls.sort((a, b) => b.date.localeCompare(a.date));
      }

      // actionsMap: hubspot_id (string) → action[]
      actionsMap = new Map();
      for (const action of actions) {
        if (!actionsMap.has(action.hubspot_id)) actionsMap.set(action.hubspot_id, []);
        actionsMap.get(action.hubspot_id).push(action);
      }

      // healthMap: hubspot_id (string) → status string
      healthMap = new Map(healthData.map(h => [String(h.hubspot_id), h.status]));

      // notesMap: hubspot_id (string) → note body string
      notesMap = new Map(notesData.map(n => [String(n.hubspot_id), n.body]));
      // Merge localStorage notes as fallback for any hid not yet on the server
      Object.entries(localNotes).forEach(([hid, body]) => {
        if (body && !notesMap.has(hid)) notesMap.set(hid, body);
      });

      allRows = hubspot;
      render();
    }).catch(() => {
      document.getElementById('crm-table-wrap').outerHTML =
        '<p class="crm-error">Customer data couldn\'t be loaded. Try refreshing.</p>';
    });

    document.getElementById('crm-search').addEventListener('input', render);

        p.classList.toggle('crm-pill--active', p === pill)
      );

    // Strategic filter dropdown
    const strategicBtn = document.getElementById('crm-strategic-btn');
    const strategicDropdown = document.getElementById('crm-strategic-dropdown');

    strategicBtn.addEventListener('click', e => {
      e.stopPropagation();

    });

      menu.style.top  = `${rect.bottom + window.scrollY + 4}px`;
      menu.style.left = `${rect.left + window.scrollX}px`;
      menu.classList.add('col-menu--open');
    });

    // --- Column header dropdown menu ---
    let activeMenuCol = null;

    function closeColMenu() {
      const m = document.getElementById('col-menu');
      if (m) m.classList.remove('col-menu--open');
      activeMenuCol = null;
    }

    function showColMenu(th, col) {
      const m = document.getElementById('col-menu');
      if (!m) return;
      // Toggle off if same column clicked again
      if (activeMenuCol === col) { closeColMenu(); return; }
      activeMenuCol = col;

      const frozen = frozenCols.has(col);
      m.innerHTML = `
        <button class="col-menu-item" data-action="freeze">${frozen ? 'Unfreeze column' : 'Freeze column'}</button>
        <div class="col-menu-divider"></div>
        <button class="col-menu-item" data-action="hide">Hide column</button>
      `;
      m.dataset.col = col;

      const rect = th.getBoundingClientRect();
      m.style.top  = `${rect.bottom + window.scrollY}px`;
      m.style.left = `${rect.left  + window.scrollX}px`;
      m.classList.add('col-menu--open');
    }

    document.getElementById('col-menu').addEventListener('click', e => {
      const item = e.target.closest('.col-menu-item');
      if (!item) return;
      const col    = document.getElementById('col-menu').dataset.col;
      const action = item.dataset.action;
      if (action === 'sort-asc')   { sortKey = col; sortDir = 'asc';  render(); }
      if (action === 'sort-desc')  { sortKey = col; sortDir = 'desc'; render(); }
      if (action === 'sort-clear') { sortKey = 'name'; sortDir = 'asc'; render(); }
      if (action === 'freeze') {
        if (frozenCols.has(col)) { frozenCols.delete(col); } else { frozenCols.add(col); }
        saveFrozenCols();
        render();
      }
      if (action === 'hide') {
        hiddenCols.add(col);
        saveHiddenCols();
        render();
      }
      if (action === 'show-col') {
        const colToShow = item.dataset.col;
        if (colToShow) { hiddenCols.delete(colToShow); saveHiddenCols(); render(); }
      }
      closeColMenu();
    });

    document.getElementById('health-menu').addEventListener('click', e => {
      const item = e.target.closest('.col-menu-item');
      if (!item) return;
      const action = item.dataset.action;
      if (action === 'set-health') {
        const hid   = item.dataset.hid;
        const value = item.dataset.value;
        if (value) {
          healthMap.set(hid, value);
        } else {
          healthMap.delete(hid);
        }
        fetch(`${WORKER_URL}/health`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ hubspot_id: hid, status: value || null }),
        }).catch(() => {});
        const menu = document.getElementById('health-menu');
        menu.classList.remove('col-menu--open');
        menu.dataset.hid = '';
        render();
      }
    });

    document.addEventListener('click', e => {
      if (!e.target.closest('#col-menu') && !e.target.closest('th[data-col]')) closeColMenu();
      if (!e.target.closest('#health-menu') && !e.target.closest('td.crm-health-cell--clickable')) {
        const hm = document.getElementById('health-menu');
        if (hm) { hm.classList.remove('col-menu--open'); hm.dataset.hid = ''; }
      }
    }, true);

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeColMenu(); });

    // --- Sort + header click ---
    const crmTable = document.querySelector('.crm-table');

    crmTable.addEventListener('click', e => {
      if (e.target.closest('.crm-resize-handle')) return;
      // ⋮ button → open col-menu (freeze/hide)
      const menuBtn = e.target.closest('.crm-th-menu-btn');
      if (menuBtn) {
        const th = menuBtn.closest('th[data-col]');
        if (th) showColMenu(th, th.dataset.col);
        return;
      }
      // Header click → sort toggle
      const th = e.target.closest('th[data-col]');
      if (!th) return;
      const col = th.dataset.col;
      if (sortKey === col) {
        if (sortDir === 'asc') { sortDir = 'desc'; }
        else { sortKey = 'name'; sortDir = 'asc'; }
      } else {
        sortKey = col; sortDir = 'asc';
      }
      render();
    });

    // --- Drag-to-reorder ---
    let dragSrcCol  = null;
    let isResizing  = false;

    crmTable.addEventListener('dragstart', e => {
      if (isResizing) { e.preventDefault(); return; }
      const th = e.target.closest('th[data-col]');
      if (!th) return;
      dragSrcCol = th.dataset.col;
      th.classList.add('crm-th--dragging');
    });

    crmTable.addEventListener('dragover', e => {
      e.preventDefault();
      const th = e.target.closest('th');
      if (!th) return;
      document.querySelectorAll('.crm-table thead th').forEach(el => el.classList.remove('crm-th--drag-over'));
      th.classList.add('crm-th--drag-over');
    });

    crmTable.addEventListener('dragend', () => {
      document.querySelectorAll('.crm-table thead th').forEach(el => {
        el.classList.remove('crm-th--dragging');
        el.classList.remove('crm-th--drag-over');
      });
      dragSrcCol = null;
    });

    crmTable.addEventListener('drop', e => {
      e.preventDefault();
      const targetCol = e.target.closest('th[data-col]')?.dataset.col;
      if (!dragSrcCol || !targetCol || dragSrcCol === targetCol) return;
      const srcIdx = colOrder.indexOf(dragSrcCol);
      const tgtIdx = colOrder.indexOf(targetCol);
      if (srcIdx === -1 || tgtIdx === -1) return;
      [colOrder[srcIdx], colOrder[tgtIdx]] = [colOrder[tgtIdx], colOrder[srcIdx]];
      localStorage.setItem('plg_crm_col_order', JSON.stringify(colOrder));
      showLayoutSavedToast();
      render();
    });

    // Card open: delegated click on ⊞ button
    document.querySelector('.crm-table').addEventListener('click', e => {
      const btn = e.target.closest('.card-open-btn');
      if (!btn) return;
      const hid = btn.dataset.hubspotId;
      const company = allRows.find(r => String(r.hubspot_id ?? '') === hid);
      if (company) openCard(company);
    });

    // Inline task add: delegated click on + button
    document.querySelector('.crm-table').addEventListener('click', e => {
      const btn = e.target.closest('.inline-task-btn');
      if (!btn) return;
      e.stopPropagation();
      openInlinePopover(btn);
    });

    // Card close: click on overlay backdrop (outside the modal)
    document.getElementById('card-overlay').addEventListener('click', e => {
      if (e.target === document.getElementById('card-overlay')) closeCard();
    });

    // Card close: × button
    document.getElementById('card-overlay').addEventListener('click', e => {
      if (e.target.closest('#card-close')) closeCard();
    });

    // Card CRUD: add form, toggle, delete
    document.getElementById('card-overlay').addEventListener('click', async e => {
      // Show add form
      if (e.target.closest('#card-add-btn')) {
        const form = document.getElementById('card-add-form');
        if (form) { form.style.display = 'flex'; document.getElementById('card-action-name')?.focus(); }
        return;
      }

      // Cancel add form
      if (e.target.closest('#card-action-cancel')) {
        const form = document.getElementById('card-add-form');
        if (form) form.style.display = 'none';
        return;
      }

      // Save new action
      if (e.target.closest('#card-action-save')) {
        const name     = document.getElementById('card-action-name')?.value.trim();
        const priority = document.getElementById('card-action-priority')?.value;
        if (!name) { document.getElementById('card-action-name')?.focus(); return; }
        const action = await createAction(openCardId, name, priority);
        if (!action) { showCardError("Couldn't save — try again"); return; }
        rerenderCardActions();
        render();
        return;
      }

      // Toggle done
      const checkBtn = e.target.closest('.action-check');
      if (checkBtn) {
        const id       = checkBtn.dataset.actionId;
        const hid      = checkBtn.dataset.hubspotId;
        const actions  = actionsMap.get(hid) ?? [];
        const existing = actions.find(a => a.id === id);
        if (!existing) return;
        const updated = await toggleAction(id, hid, existing.done);
        if (!updated) { showCardError("Couldn't save — try again"); return; }
        rerenderCardActions();
        render();
        return;
      }

      // Delete
      const delBtn = e.target.closest('.action-delete');
      if (delBtn) {
        const id  = delBtn.dataset.actionId;
        const hid = delBtn.dataset.hubspotId;
        const ok  = await deleteAction(id, hid);
        if (!ok) { showCardError("Couldn't delete — try again"); return; }
        rerenderCardActions();
        render();
        return;
      }
    });

    // Enter key in card add form
    document.getElementById('card-overlay').addEventListener('keydown', async e => {
      if (e.key !== 'Enter') return;
      if (!e.target.closest('#card-add-form')) return;
      e.preventDefault();
      document.getElementById('card-action-save')?.click();
    });

    //Inline popover: save on button click
    document.getElementById('inline-add-popover').addEventListener('click', async e => {
      if (!e.target.closest('.inline-action-save')) return;
      const p        = document.getElementById('inline-add-popover');
      const hid      = p.dataset.hubspotId;
      const name     = p.querySelector('.inline-action-name')?.value.trim();
      const priority = p.querySelector('.inline-action-priority')?.value;
      if (!name) { p.querySelector('.inline-action-name')?.focus(); return; }
      const action = await createAction(hid, name, priority);
      if (!action) return;
      closeInlinePopover();
      render();
    });

    // Inline popover: save on Enter key
    document.getElementById('inline-add-popover').addEventListener('keydown', async e => {
      if (e.key !== 'Enter') return;
      e.preventDefault();
      document.querySelector('#inline-add-popover .inline-action-save')?.click();
    });

    // Inline popover: close on Escape
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeInlinePopover();
    });

    // Inline popover: close on click outside
    document.addEventListener('click', e => {
      const p = document.getElementById('inline-add-popover');
      if (!p?.classList.contains('inline-add-popover--open')) return;
      if (!p.contains(e.target)) closeInlinePopover();
    }, true);

    // --- Health cell click → dropdown ---
    crmTable.addEventListener('click', e => {
      const td = e.target.closest('td.crm-health-cell--clickable');
      if (!td) return;
      e.stopPropagation();
      const hid = String(td.dataset.hubspotId ?? '');
      if (!hid) return;

      // Close if same cell clicked again
      const menu = document.getElementById('health-menu');
      if (menu.dataset.hid === hid && menu.classList.contains('col-menu--open')) {
        menu.classList.remove('col-menu--open');
        menu.dataset.hid = '';
        return;
      }

      const current = healthMap.get(hid) ?? '';
      const opts = [
        { value: 'excellent', label: 'Excellent' },
        { value: 'good',      label: 'Good' },
        { value: 'fair',      label: 'Fair' },
        { value: 'risk',      label: 'Risk' },
        { value: '',          label: '— Clear health —' },
      ];
      menu.innerHTML = opts.map(o =>
        `<button class="col-menu-item${o.value === current ? ' col-menu-item--active' : ''}" data-action="set-health" data-hid="${escHtml(hid)}" data-value="${escHtml(o.value)}">${escHtml(o.label)}</button>`
      ).join('');
      menu.dataset.hid = hid;
      const rect = td.getBoundingClientRect();
      menu.style.top  = `${rect.bottom + window.scrollY}px`;
      menu.style.left = `${rect.left  + window.scrollX}px`;
      menu.classList.add('col-menu--open');
    });

    // --- Notes popup (click) ---
    crmTable.addEventListener('click', e => {
      const td = e.target.closest('td.crm-notes');
      if (!td) return;
      const fullText = td.dataset.fullNotes ?? '';
      if (!fullText) return;
      const overlay = document.getElementById('card-overlay');
      overlay.innerHTML = `
        <div class="card-modal" id="card-modal" style="max-width:560px">
          <div class="card-modal-header">
            <div class="card-modal-company">Notes</div>
            <button class="card-modal-close" id="card-close">×</button>
          </div>
          <div class="card-modal-body" style="display:block;padding:20px 24px">
            <p style="white-space:pre-wrap;word-break:break-word;overflow-wrap:anywhere;line-height:1.6;margin:0;font-size:14px;color:var(--so-text-body)">${escHtml(fullText)}</p>
          </div>
        </div>
      `;
      overlay.classList.add('card-overlay--open');
      document.addEventListener('keydown', handleCardKeydown);
    });

    // Local notes cell: double-click → editable popup
    crmTable.addEventListener('dblclick', e => {
      const td = e.target.closest('td.crm-local-notes-cell--clickable');
      if (!td) return;
      const hid = String(td.dataset.hubspotId ?? '');
      if (!hid) return;
      const currentNote = notesMap.get(hid) ?? '';
      const company = allRows.find(r => String(r.hubspot_id ?? '') === hid);
      const companyName = company ? escHtml(company.name ?? '') : 'Notes';

      const overlay = document.getElementById('card-overlay');
      overlay.innerHTML = `
        <div class="card-modal" id="card-modal" style="max-width:560px">
          <div class="card-modal-header">
            <div class="card-modal-company">${companyName}</div>
            <button class="card-modal-close" id="card-close">×</button>
          </div>
          <div class="card-modal-body" style="display:block;padding:20px 24px">
            <textarea id="notes-edit-ta" style="width:100%;min-height:180px;font-family:var(--so-font-body);font-size:14px;color:var(--so-text-body);border:1px solid var(--so-neutral-10);border-radius:8px;padding:10px 12px;resize:vertical;outline:none;line-height:1.6;box-sizing:border-box;" placeholder="Add a note…">${escHtml(currentNote)}</textarea>
          </div>
          <div style="display:flex;justify-content:flex-end;gap:8px;padding:0 24px 20px">
            <button id="notes-popup-cancel" style="font-family:var(--so-font-body);font-size:13px;font-weight:500;color:var(--so-text-tag);background:var(--so-foreground);border:1px solid var(--so-neutral-10);border-radius:20px;padding:6px 16px;cursor:pointer;">Cancel</button>
            <button id="notes-popup-save" data-hid="${escHtml(hid)}" style="font-family:var(--so-font-body);font-size:13px;font-weight:600;color:#fff;background:var(--so-primary);border:none;border-radius:20px;padding:6px 16px;cursor:pointer;">Save</button>
          </div>
        </div>
      `;
      overlay.classList.add('card-overlay--open');

      document.getElementById('notes-popup-save').addEventListener('click', async function () {
        const body = document.getElementById('notes-edit-ta').value;
        const saveHid = this.dataset.hid;
        notesMap.set(saveHid, body);
        localNotes[saveHid] = body;
        saveLocalNotes();
        overlay.classList.remove('card-overlay--open');
        overlay.innerHTML = '';
        try {
          await fetch(`${WORKER_URL}/notes`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ hubspot_id: saveHid, notes: body }),
          });
        } catch { /* silent */ }
        render();
      });

      document.getElementById('notes-popup-cancel').addEventListener('click', () => {
        overlay.classList.remove('card-overlay--open');
        overlay.innerHTML = '';
      });

      document.getElementById('card-close').addEventListener('click', () => {
        overlay.classList.remove('card-overlay--open');
        overlay.innerHTML = '';
      });

      // Ctrl+Enter to save in notes popup
      document.getElementById('notes-edit-ta').addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
          e.preventDefault();
          document.getElementById('notes-popup-save').click();
        }
      });

      document.addEventListener('keydown', handleCardKeydown);
    });

    // --- Column resize ---
    let resizingCol = null;
    let resizeStartX = 0;
    let resizeStartW = 0;

    document.addEventListener('mousedown', e => {
      const handle = e.target.closest('.crm-resize-handle');
      if (!handle) return;
      const th = handle.closest('th[data-col]');
      if (!th) return;
      isResizing  = true;
      resizingCol = th.dataset.col;
      resizeStartX = e.clientX;
      resizeStartW = colWidths[resizingCol] ?? DEFAULT_COL_WIDTHS[resizingCol];
      handle.classList.add('crm-resize-handle--active');
      e.preventDefault();
    });

    document.addEventListener('mousemove', e => {
      if (!isResizing || !resizingCol) return;
      const newW = Math.max(60, resizeStartW + (e.clientX - resizeStartX));
      colWidths[resizingCol] = newW;
      applyColWidths();
    });

    document.addEventListener('mouseup', () => {
      if (!isResizing) return;
      isResizing = false;
      document.querySelectorAll('.crm-resize-handle--active').forEach(h =>
        h.classList.remove('crm-resize-handle--active')
      );
      resizingCol = null;
      saveColWidths();
      showLayoutSavedToast();
    });

    // Row checkbox: delegate click on table
    document.querySelector('.crm-table').addEventListener('click', e => {
      const cb = e.target.closest('.crm-row-cb');
      if (cb) {
        const hid = String(cb.dataset.hubspotId ?? '');
        if (cb.checked) { selectedRows.add(hid); } else { selectedRows.delete(hid); }
        render();
        return;
      }
      const selectAll = e.target.closest('.crm-select-all');
      if (selectAll) {
        const rows = document.querySelectorAll('.crm-row-cb');
        if (selectAll.checked) {
          rows.forEach(r => selectedRows.add(String(r.dataset.hubspotId ?? '')));
        } else {
          rows.forEach(r => selectedRows.delete(String(r.dataset.hubspotId ?? '')));
        }
        render();
        return;
      }
    });

    // Bulk apply
    document.getElementById('crm-bulk-apply').addEventListener('click', async () => {
      const status = document.getElementById('crm-bulk-health').value;
      const hids = [...selectedRows];
      if (hids.length === 0) return;
      try {
        if (status) {
          await fetch(`${WORKER_URL}/health/bulk`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ updates: hids.map(h => ({ hubspot_id: h, status })) }),
          });
          hids.forEach(h => healthMap.set(h, status));
        } else {
          // Clear health: delete one by one
          await Promise.all(hids.map(h =>
            fetch(`${WORKER_URL}/health/${encodeURIComponent(h)}`, { method: 'DELETE' }).catch(() => {})
          ));
          hids.forEach(h => healthMap.delete(h));
        }
        selectedRows.clear();
        render();
      } catch { /* silent */ }
    });

    // Bulk clear selection
    document.getElementById('crm-bulk-clear').addEventListener('click', () => {
      selectedRows.clear();
      render();
    });

  </script>

  <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.min.js"></script>
  <script>
    // ── CRM Animations ────────────────────────────────────────────────────────
    // All animations are guarded by prefers-reduced-motion.
    // This block does not modify any existing variables or functions — it only
    // wraps render and openCard, and adds capture-phase event listeners.

    (function () {
      var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      // ── Animation 1 — row stagger entrance ───────────────────────────────────
      // Wrap render() so that after the tbody is rebuilt we stagger the new rows
      // in. Capped at the first 20 rows so a large list doesn't animate forever.
      // Filter/search re-renders are distinguished from the initial data load by
      // the _crmFirstRender flag — both get the stagger, but the filter pulse
      // (animation 2) only fires on subsequent renders.
      var _crmFirstRender = true;
      var _originalRender = render;

      render = function () {
        _originalRender.apply(this, arguments);

        var rows = Array.prototype.slice.call(
          document.querySelectorAll('#crm-tbody tr:not(.expand-sub-row)'),
          0, 20
        );

        if (rows.length === 0) return;

        if (!reduced) {
          // Set initial invisible state so there is no flash before anime runs
          rows.forEach(function (row) { row.style.opacity = '0'; });

          anime({
            targets: rows,
            opacity: [0, 1],
            translateY: [12, 0],
            duration: 350,
            easing: 'cubicBezier(.4, 0, .2, 1)',
            delay: anime.stagger(40),
          });
        } else {
          rows.forEach(function (row) { row.style.opacity = '1'; });
        }

        _crmFirstRender = false;
      };

      // ── Animation 2 — search/filter pulse ────────────────────────────────────
      // Fires in the capture phase before the existing listeners that call
      // render(), so the dim starts while the new list is still being built.
      // Only runs after the initial data load (skip the very first render).
      function pulseRows() {
        if (_crmFirstRender) return;
        if (reduced) return;
        var rows = document.querySelectorAll('#crm-tbody tr:not(.expand-sub-row)');
        if (rows.length === 0) return;
        anime({
          targets: rows,
          opacity: [1, 0.3, 1],
          duration: 250,
          easing: 'cubicBezier(.4, 0, .2, 1)',
        });
      }

      document.getElementById('crm-search').addEventListener('input', pulseRows, true);
      document.getElementById('crm-type-pills').addEventListener('click', function (e) {
        if (e.target.closest('.crm-pill')) pulseRows();
      }, true);
      document.getElementById('crm-strategic-dropdown').addEventListener('click', function (e) {
        if (e.target.closest('.crm-strategic-opt')) pulseRows();
      }, true);

      // ── Animation 3 — modal/card entrance ────────────────────────────────────
      // Wrap openCard() so the card-modal animates in after the overlay opens.
      var _originalOpenCard = openCard;

      openCard = function (company) {
        _originalOpenCard.apply(this, arguments);

        if (!reduced) {
          var modal = document.getElementById('card-modal');
          if (!modal) return;
          anime({
            targets: modal,
            opacity: [0, 1],
            translateY: [8, 0],
            scale: [0.97, 1],
            duration: 250,
            easing: 'cubicBezier(.4, 0, .2, 1)',
          });
        }
      };

      // The notes popup (crm-notes cell click) uses the same overlay but does
      // not go through openCard. Observe overlay class changes to catch it.
      var overlay = document.getElementById('card-overlay');
      if (overlay && !reduced) {
        var observer = new MutationObserver(function (mutations) {
          mutations.forEach(function (m) {
            if (m.type !== 'attributes' || m.attributeName !== 'class') return;
            // Only fire when the overlay has just become open and there is a
            // modal that was NOT already animated (openCard wraps its own case).
            if (!overlay.classList.contains('card-overlay--open')) return;
            var modal = document.getElementById('card-modal');
            // openCard sets openCardId; notes popup does not — use that to
            // distinguish. openCard has already animated its modal, so only
            // animate here when openCardId is null (notes popup path).
            if (!modal || openCardId !== null) return;
            anime({
              targets: modal,
              opacity: [0, 1],
              translateY: [8, 0],
              scale: [0.97, 1],
              duration: 250,
              easing: 'cubicBezier(.4, 0, .2, 1)',
            });
          });
        });
        observer.observe(overlay, { attributes: true });
      }
    }());
  </script>
