<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer List — PLG-Hub</title>
  <link rel="stylesheet" href="style.css">
  <script src="auth.js"></script>
</head>
<body>

  <header class="site-header">
    <div class="site-header-inner">
      <a href="http://go/plg-hub" class="site-logo">
        <svg class="site-logo-svg" viewBox="6 2 28 38" width="16" height="16" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round"><path d="M20 4 C12 4 8 10 8 16 L8 28 C8 34 12 38 18 38 L22 38 C28 38 32 34 32 28 L32 14 C32 10 29 8 26 8 L24 8 C21 8 18 10 18 14 L18 26 C18 28 20 30 22 30 L24 30 C26 30 28 28 28 26 L28 14"/></svg>
        PLG-Hub
      </a>
      <nav class="site-nav">
        <a href="dashboard.html" class="site-nav-link">Dashboard</a>
        <a href="crm.html" class="site-nav-link site-nav-link--active">Customer List</a>
        <a href="index.html" class="site-nav-link">Customer Support <span class="nav-coming-soon">soon</span></a>
        <a href="connectors.html" class="site-nav-link">Connectors</a>
      </nav>
    </div>
  </header>

  <main class="page-main page-main--crm">

    <div class="crm-toolbar">
      <div class="crm-toolbar-left">
        <div class="crm-search-wrap">
          <svg class="crm-search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="6.5" cy="6.5" r="4"/>
            <line x1="9.5" y1="9.5" x2="13.5" y2="13.5"/>
          </svg>
          <input id="crm-search" class="crm-search" type="search" placeholder="Search customers…" autocomplete="off">
        </div>
        <div class="crm-type-pills" id="crm-type-pills">
          <button class="crm-pill crm-pill--active" data-type="">All</button>
          <button class="crm-pill" data-type="Customer - PLG">PLG</button>
          <button class="crm-pill" data-type="Customer - SLG">SLG</button>
          <button class="crm-pill" data-type="Customer">Cust</button>
        </div>
      </div>
      <div class="crm-toolbar-right">
        <span id="crm-count" class="crm-count"></span>
      </div>
    </div>

    <div id="crm-table-wrap" class="crm-table-wrap">
      <table class="crm-table" id="crm-table">
        <colgroup id="crm-colgroup"></colgroup>
        <thead></thead>
        <tbody id="crm-tbody">
          <tr><td colspan="12" class="crm-placeholder" style="text-align:center;padding:32px">Loading…</td></tr>
        </tbody>
      </table>
    </div>

  </main>

  <div id="card-overlay" class="card-overlay"></div>
  <div id="inline-add-popover" class="inline-add-popover"></div>
  <div id="col-menu" class="col-menu"></div>

  <script>
    // --- Constants ---
    const WORKER_URL = 'https://stack-plg-actions.charlie-9e7.workers.dev';
    const PLACEHOLDER_CELL = '<td></td>';

    const DEFAULT_COL_ORDER = [
      'name', 'contact', 'notes', 'local_notes', 'last_contact',
      'account', 'integrations', 'clicks', 'api_requests',
      'tickets_total', 'open_tickets', 'cs_actions', 'last_call',
    ];

    // Default widths (px) — sum ~1385px, fills a 1400px container
    const DEFAULT_COL_WIDTHS = {
      name:          150,
      contact:       160,
      notes:         170,
      local_notes:   160,
      last_contact:  105,
      account:       120,
      integrations:   95,
      clicks:         75,
      api_requests:   95,
      tickets_total:  95,
      open_tickets:   95,
      cs_actions:     95,
      last_call:     130,
    };

    function thHtml(col, label) {
      const pinned = frozenCols.has(col);
      const cls = ['crm-th--clickable', pinned ? 'crm-th--frozen' : ''].filter(Boolean).join(' ');
      return `<th data-col="${col}" draggable="${!pinned}" class="${cls}">` +
        `${label}<div class="crm-resize-handle"></div></th>`;
    }

    const COL_HEADERS = {
      name:          () => thHtml('name', 'Name'),
      contact:       () => thHtml('contact', 'Primary contact'),
      notes:         () => thHtml('notes', 'HubSpot Notes'),
      local_notes:   () => thHtml('local_notes', 'Notes'),
      last_contact:  () => thHtml('last_contact', 'Last contact'),
      account:       () => thHtml('account', 'Pylon account'),
      integrations:  () => thHtml('integrations', 'Integrations'),
      clicks:        () => thHtml('clicks', 'Clicks'),
      api_requests:  () => thHtml('api_requests', 'API requests'),
      tickets_total: () => thHtml('tickets_total', 'Tickets (30d)'),
      open_tickets:  () => thHtml('open_tickets', 'Open tickets'),
      cs_actions:    () => thHtml('cs_actions', 'CS actions'),
      last_call:     () => thHtml('last_call', 'Most recent call'),
    };

    const CELLS = {
      name: company => {
        const display    = company.name ?? company.hubspot_id;
        const href       = safeHref(company.hubspot_url);
        const hid        = escHtml(String(company.hubspot_id ?? ''));
        const badge      = typeBadge(company.type);
        const avatar     = avatarHtml(company.name);
        const c          = isContactObj(company.contact) ? company.contact : null;
        const mailtoHref = c?.email ? `mailto:${c.email}` : null;
        const pylonEntry = company.hubspot_id ? pylonMap.get(String(company.hubspot_id)) : null;
        const pylonHref  = pylonEntry ? escHtml(`https://app.usepylon.com/accounts/${pylonEntry.pylon_account_id}`) : null;
        const quickLinks = [
          href !== '#' ? `<a href="${href}" class="crm-row-action" target="_blank" rel="noopener" title="Open in HubSpot"><svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="2" width="14" height="12" rx="2"/><path d="M1 6h14"/><path d="M6 2v4"/><path d="M10 2v4"/></svg></a>` : '',
          mailtoHref    ? `<a href="${mailtoHref}" class="crm-row-action" title="Send email"><svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="14" height="10" rx="1.5"/><path d="M1 4l7 5 7-5"/></svg></a>` : '',
          pylonHref     ? `<a href="${pylonHref}" class="crm-row-action" target="_blank" rel="noopener" title="Open in Pylon"><svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="6"/><path d="M6 6h3.5a1.5 1.5 0 010 3H6v3"/></svg></a>` : '',
        ].filter(Boolean).join('');
        return `<td class="crm-name-cell">
          ${avatar}<button class="card-open-btn" data-hubspot-id="${hid}" aria-label="Open card">⊞</button>
          <a href="${href}" target="_blank" rel="noopener">${escHtml(display)}</a>${badge}
          <div class="crm-row-actions">${quickLinks}</div>
        </td>`;
      },
      contact: company => {
        const c = isContactObj(company.contact) ? company.contact : null;
        if (!c || !c.name) return PLACEHOLDER_CELL;
        const name = escHtml(c.name);
        // Build HubSpot contact URL if we have _id
        let contactHref = null;
        if (c._id && company.hubspot_url) {
          const portalMatch = company.hubspot_url.match(/\/contacts\/(\d+)\//);
          if (portalMatch) {
            contactHref = `https://app-eu1.hubspot.com/contacts/${portalMatch[1]}/record/0-1/${c._id}`;
          }
        }
        const emailBtn = c.email
          ? `<a href="mailto:${escHtml(c.email)}" class="crm-email-btn" title="Email ${escHtml(c.name)}" onclick="event.stopPropagation()"><svg viewBox="0 0 14 14" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="2.5" width="12" height="9" rx="1.5"/><path d="M1 3.5l6 4.5 6-4.5"/></svg></a>`
          : '';
        const nameEl = contactHref
          ? `<a href="${escHtml(contactHref)}" target="_blank" rel="noopener" class="crm-contact-name-link">${name}</a>`
          : name;
        return `<td><div class="crm-contact-cell">${nameEl}${emailBtn}</div></td>`;
      },
      notes: company => {
        const n = company.notes;
        if (!n) return PLACEHOLDER_CELL;
        const truncated = n.length > 80 ? n.slice(0, 80) + '…' : n;
        return `<td class="crm-notes" title="${escHtml(n)}">${escHtml(truncated)}</td>`;
      },
      local_notes: company => {
        const hid  = escHtml(String(company.hubspot_id ?? ''));
        const note = localNotes[String(company.hubspot_id)] ?? '';
        const display = escHtml(note.length > 60 ? note.slice(0, 60) + '…' : note);
        return `<td class="crm-local-notes-cell" data-hubspot-id="${hid}" title="${escHtml(note)}">${display || '<span class="crm-placeholder">Add note…</span>'}</td>`;
      },
      last_contact: company => {
        const rel = relativeTime(company.last_contact);
        if (!rel) return PLACEHOLDER_CELL;
        const abs = new Date(company.last_contact).toLocaleDateString('en-GB', {
          day: 'numeric', month: 'short', year: 'numeric',
        });
        const activityUrl = company.hubspot_url ? safeHref(company.hubspot_url) : null;
        return activityUrl
          ? `<td class="crm-date" title="${escHtml(abs)}"><a href="${activityUrl}" target="_blank" rel="noopener">${escHtml(rel)}</a></td>`
          : `<td class="crm-date" title="${escHtml(abs)}">${escHtml(rel)}</td>`;
      },
      account: company => {
        const py = company.hubspot_id ? pylonMap.get(String(company.hubspot_id)) : null;
        if (!py) return PLACEHOLDER_CELL;
        const pylonUrl = `https://app.usepylon.com/accounts/${py.pylon_account_id}`;
        return `<td><a href="${escHtml(pylonUrl)}" target="_blank" rel="noopener">${escHtml(py.name)}</a></td>`;
      },
      integrations: company => {
        const ph = posthogMap.get(normName(company.name));
        return ph != null
          ? `<td class="crm-num">${ph.linked_accounts.toLocaleString()}</td>`
          : PLACEHOLDER_CELL;
      },
      clicks: company => {
        const ph = posthogMap.get(normName(company.name));
        return ph != null
          ? `<td class="crm-num">${ph.click_interactions.toLocaleString()}</td>`
          : PLACEHOLDER_CELL;
      },
      api_requests:  () => PLACEHOLDER_CELL,
      tickets_total: company => {
        const py = company.hubspot_id ? pylonMap.get(String(company.hubspot_id)) : null;
        return py ? `<td class="crm-num">${py.issues_last_30d.total}</td>` : PLACEHOLDER_CELL;
      },
      open_tickets: company => {
        const py = company.hubspot_id ? pylonMap.get(String(company.hubspot_id)) : null;
        if (!py) return PLACEHOLDER_CELL;
        const count = py.open_tickets_live ?? py.issues_last_30d.open;
        const pylonUrl = escHtml(`https://app.usepylon.com/accounts/${py.pylon_account_id}`);
        return `<td class="crm-num"><a href="${pylonUrl}" target="_blank" rel="noopener">${count}</a></td>`;
      },
      cs_actions: company => {
        const hid = escHtml(String(company.hubspot_id ?? ''));
        return `<td>
          <div class="actions-cell">
            <button class="add-action-btn" data-hubspot-id="${hid}">+ Add</button>
          </div>
        </td>`;
      },
      last_call: company => {
        const ff = company.domain ? firefliesMap.get(company.domain) : null;
        if (!ff) return PLACEHOLDER_CELL;
        const dateStr = new Date(ff.date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
        const href = ff.id ? escHtml(`https://app.fireflies.ai/view/call--${ff.id}`) : 'https://app.fireflies.ai/';
        return `<td><a href="${href}" target="_blank" rel="noopener" class="crm-call-link">${escHtml(ff.title)}</a><div class="crm-contact-email">${escHtml(dateStr)}</div></td>`;
      },
    };

    // --- State ---
    let allRows             = [];
    let posthogMap          = new Map();
    let firefliesMap        = new Map();  // domain → most-recent call (for Last call column)
    let firefliesActionsMap = new Map();  // domain → all calls sorted desc (for card)
    let pylonMap            = new Map();  // hubspot_id → pylon account
    let actionsMap          = new Map();  // hubspot_id (string) → action[]
    let openCardId          = null;       // hubspot_id of the open card, or null
    let typeFilter = '';
    let sortKey  = 'name';
    let sortDir  = 'asc';
    let clickCounts = {};
    let colOrder   = loadColOrder();
    let colWidths  = loadColWidths();
    let frozenCols = loadFrozenCols();

    // Local notes: per-company freetext stored in localStorage
    let localNotes = (() => {
      try { return JSON.parse(localStorage.getItem('plg_crm_local_notes') ?? 'null') ?? {}; }
      catch { return {}; }
    })();
    function saveLocalNotes() {
      localStorage.setItem('plg_crm_local_notes', JSON.stringify(localNotes));
    }

    // --- Helpers ---

    function escHtml(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function safeHref(url) {
      if (!url) return '#';
      try {
        const u = new URL(url, location.href);
        return (u.protocol === 'https:' || u.protocol === 'http:') ? escHtml(url) : '#';
      } catch { return '#'; }
    }

    function isContactObj(c) {
      return c !== null && typeof c === 'object' && !Array.isArray(c);
    }

    function normName(s) {
      return (s ?? '').toLowerCase().replace(/[^a-z0-9]/g, '');
    }

    function avatarHtml(name) {
      const letter = (name ?? '?')[0].toUpperCase();
      const COLORS = [
        ['#EFF6FF', '#1D4ED8'], ['#F0FDF4', '#15803D'], ['#FFF7ED', '#C2410C'],
        ['#FAF5FF', '#7C3AED'], ['#FFF1F2', '#BE123C'], ['#F0FDFA', '#0F766E'],
      ];
      const [bg, fg] = COLORS[((name ?? '').charCodeAt(0) || 0) % COLORS.length];
      return `<span class="crm-avatar" style="background:${bg};color:${fg}">${escHtml(letter)}</span>`;
    }

    function typeBadge(type) {
      if (!type) return '';
      if (type === 'Customer - PLG') return '<span class="crm-type-badge crm-type-badge--plg">PLG</span>';
      if (type === 'Customer - SLG') return '<span class="crm-type-badge crm-type-badge--slg">SLG</span>';
      return '<span class="crm-type-badge crm-type-badge--cust">Cust</span>';
    }

    function contactSortValue(company) {
      const c = isContactObj(company.contact) ? company.contact : null;
      if (!c || !c.name) return '\uffff';
      const parts = c.name.trim().split(/\s+/);
      const last  = parts.at(-1) ?? '';
      const first = parts.slice(0, -1).join(' ');
      return (last + (first ? ' ' + first : '')).toLowerCase();
    }

    function loadColOrder() {
      try {
        const parsed = JSON.parse(localStorage.getItem('plg_crm_col_order'));
        const valid =
          Array.isArray(parsed) &&
          parsed.length === DEFAULT_COL_ORDER.length &&
          new Set(parsed).size === DEFAULT_COL_ORDER.length &&
          DEFAULT_COL_ORDER.every(k => parsed.includes(k));
        return valid ? parsed : [...DEFAULT_COL_ORDER];
      } catch {
        return [...DEFAULT_COL_ORDER];
      }
    }

    function loadColWidths() {
      try {
        const parsed = JSON.parse(localStorage.getItem('plg_crm_col_widths') ?? 'null');
        return (parsed && typeof parsed === 'object') ? { ...DEFAULT_COL_WIDTHS, ...parsed } : { ...DEFAULT_COL_WIDTHS };
      } catch {
        return { ...DEFAULT_COL_WIDTHS };
      }
    }

    function saveColWidths() {
      localStorage.setItem('plg_crm_col_widths', JSON.stringify(colWidths));
    }

    function loadFrozenCols() {
      try {
        const raw = localStorage.getItem('plg_crm_frozen');
        if (raw === null) return new Set(['name']); // first visit: freeze name by default
        const parsed = JSON.parse(raw);
        return new Set(Array.isArray(parsed) ? parsed.filter(c => DEFAULT_COL_ORDER.includes(c)) : ['name']);
      } catch {
        return new Set(['name']);
      }
    }

    function saveFrozenCols() {
      localStorage.setItem('plg_crm_frozen', JSON.stringify([...frozenCols]));
    }

    // Frozen columns first, then the rest in colOrder sequence
    function getEffectiveOrder() {
      const frozen = colOrder.filter(c => frozenCols.has(c));
      const rest   = colOrder.filter(c => !frozenCols.has(c));
      return [...frozen, ...rest];
    }

    function applyColWidths() {
      const cg = document.getElementById('crm-colgroup');
      if (!cg) return;
      const order = getEffectiveOrder();
      cg.innerHTML = order.map(col =>
        `<col data-col="${col}" style="width:${colWidths[col] ?? DEFAULT_COL_WIDTHS[col]}px">`
      ).join('');
    }

    function applyFrozenStyles() {
      const table = document.querySelector('.crm-table');
      const thead = table.querySelector('thead');
      const tbody = table.querySelector('tbody');
      const order = getEffectiveOrder();
      let offset = 0;
      order.forEach((col, colIdx) => {
        const frozen = frozenCols.has(col);
        const w = colWidths[col] ?? DEFAULT_COL_WIDTHS[col];
        if (frozen) {
          const th = thead.querySelector(`th[data-col="${col}"]`);
          if (th) { th.style.position = 'sticky'; th.style.left = offset + 'px'; th.style.zIndex = '5'; }
          tbody.querySelectorAll('tr').forEach(row => {
            const td = row.cells[colIdx];
            if (td) { td.style.position = 'sticky'; td.style.left = offset + 'px'; td.style.zIndex = '1'; td.classList.add('crm-td--frozen'); }
          });
          offset += w;
        }
      });
    }

    function relativeTime(iso) {
      if (!iso) return null;
      const diff = Date.now() - new Date(iso).getTime();
      if (isNaN(diff) || diff < 0) return 'Today';
      const days = Math.floor(diff / 86400000);
      if (days === 0)  return 'Today';
      if (days === 1)  return 'Yesterday';
      if (days < 7)    return `${days} days ago`;
      const weeks = Math.floor(days / 7);
      if (weeks < 8)   return `${weeks} ${weeks === 1 ? 'week' : 'weeks'} ago`;
      const months = Math.floor(days / 30);
      if (months < 2)  return `${weeks} weeks ago`;
      if (months < 24) return `${months} months ago`;
      const years = Math.floor(days / 365);
      return `${years} ${years === 1 ? 'year' : 'years'} ago`;
    }

    function searchMatch(company, query) {
      const q = query.toLowerCase();
      const c = isContactObj(company.contact) ? company.contact : null;
      return (
        (company.name   ?? '').toLowerCase().includes(q) ||
        (company.domain ?? '').toLowerCase().includes(q) ||
        (c?.name  ?? '').toLowerCase().includes(q) ||
        (c?.email ?? '').toLowerCase().includes(q) ||
        (company.notes ?? '').toLowerCase().includes(q) ||
        (localNotes[String(company.hubspot_id)] ?? '').toLowerCase().includes(q)
      );
    }

    function lastContactSortValue(company, dir) {
      if (!company.last_contact) return dir === 'asc' ? Infinity : -Infinity;
      const t = new Date(company.last_contact).getTime();
      return isNaN(t) ? (dir === 'asc' ? Infinity : -Infinity) : t;
    }

    function sortedRows(rows) {
      return [...rows].sort((a, b) => {
        const dir = sortDir === 'asc' ? 1 : -1;
        switch (sortKey) {
          case 'contact':
            return dir * contactSortValue(a).localeCompare(contactSortValue(b));
          case 'notes': {
            if (!a.notes && !b.notes) return 0;
            if (!a.notes) return 1; if (!b.notes) return -1;
            return dir * a.notes.toLowerCase().localeCompare(b.notes.toLowerCase());
          }
          case 'last_contact': {
            const va = lastContactSortValue(a, sortDir), vb = lastContactSortValue(b, sortDir);
            return va === vb ? 0 : (va > vb ? dir : -dir);
          }
          case 'account': {
            const na = (pylonMap.get(String(a.hubspot_id))?.name ?? '').toLowerCase();
            const nb = (pylonMap.get(String(b.hubspot_id))?.name ?? '').toLowerCase();
            return dir * na.localeCompare(nb);
          }
          case 'integrations': {
            const ia = posthogMap.get(normName(a.name))?.linked_accounts ?? -1;
            const ib = posthogMap.get(normName(b.name))?.linked_accounts ?? -1;
            return dir * (ia - ib);
          }
          case 'clicks': {
            const ca = posthogMap.get(normName(a.name))?.click_interactions ?? -1;
            const cb = posthogMap.get(normName(b.name))?.click_interactions ?? -1;
            return dir * (ca - cb);
          }
          case 'tickets_total': {
            const ta = pylonMap.get(String(a.hubspot_id))?.issues_last_30d.total ?? -1;
            const tb = pylonMap.get(String(b.hubspot_id))?.issues_last_30d.total ?? -1;
            return dir * (ta - tb);
          }
          case 'open_tickets': {
            const pa = pylonMap.get(String(a.hubspot_id));
            const pb = pylonMap.get(String(b.hubspot_id));
            const oa = pa ? (pa.open_tickets_live ?? pa.issues_last_30d.open) : -1;
            const ob = pb ? (pb.open_tickets_live ?? pb.issues_last_30d.open) : -1;
            return dir * (oa - ob);
          }
          case 'cs_actions': {
            const ca = actionsMap.get(String(a.hubspot_id ?? ''))?.filter(x => !x.done).length ?? 0;
            const cb = actionsMap.get(String(b.hubspot_id ?? ''))?.filter(x => !x.done).length ?? 0;
            return dir * (ca - cb);
          }
          case 'last_call': {
            const da = a.domain ? (firefliesMap.get(a.domain)?.date ?? '') : '';
            const db = b.domain ? (firefliesMap.get(b.domain)?.date ?? '') : '';
            if (!da && !db) return 0;
            if (!da) return 1; if (!db) return -1;
            return dir * da.localeCompare(db);
          }
          default:
            return dir * (a.name ?? '').localeCompare(b.name ?? '');
        }
      });
    }

    // --- Card modal ---

    function renderCardLeft(company, c, gmailUrl, calls) {
      const py  = company.hubspot_id ? pylonMap.get(String(company.hubspot_id)) : null;
      const rel = relativeTime(company.last_contact);
      const abs = company.last_contact
        ? new Date(company.last_contact).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
        : null;

      const ffHtml = calls.length === 0
        ? '<p class="ff-empty">No calls on record.</p>'
        : calls.map(call => {
            const callDate = new Date(call.date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
            const items = call.action_items ?? [];
            const itemsHtml = items.length === 0
              ? '<div class="ff-empty">No action items.</div>'
              : items.map(item => `<div class="ff-action"><span class="ff-dot"></span>${escHtml(item)}</div>`).join('');
            return `<div class="ff-item">
              <div class="ff-call">${escHtml(call.title)} · ${escHtml(callDate)}</div>
              ${itemsHtml}
            </div>`;
          }).join('');

      return `
        <div class="card-section-label">Customer details</div>
        ${c ? `
          <div class="field-row">
            <div class="field-label">Primary contact</div>
            <div class="field-value">${escHtml(c.name ?? '')}</div>
            ${gmailUrl
              ? `<div class="field-email"><a href="${escHtml(gmailUrl)}" target="_blank" rel="noopener">${escHtml(c.email)}</a></div>`
              : ''}
          </div>
        ` : ''}
        ${rel ? `
          <div class="field-row">
            <div class="field-label">Last contact</div>
            <div class="field-date-rel">${escHtml(rel)}</div>
            <div class="field-date-abs">${escHtml(abs ?? '')}</div>
          </div>
        ` : ''}
        ${company.notes ? `
          <div class="field-row">
            <div class="field-label">Notes</div>
            <div class="field-notes">${escHtml(company.notes)}</div>
          </div>
        ` : ''}
        ${py ? `
          <div class="section-divider"></div>
          <div class="card-section-label">Support</div>
          <div class="field-row">
            <div class="field-label">Open tickets</div>
            <div class="field-value">
              <a href="${escHtml(`https://app.usepylon.com/accounts/${py.pylon_account_id}`)}" target="_blank" rel="noopener" class="card-hs-link">
                ${py.open_tickets_live ?? py.issues_last_30d.open} open
              </a>
              <span class="field-date-abs"> · ${py.issues_last_30d.total} in last 30d</span>
            </div>
          </div>
        ` : ''}
        <div class="section-divider"></div>
        <div class="card-section-label">Fireflies actions</div>
        ${ffHtml}
      `;
    }

    function renderCardRight(actions) {
      const open = actions.filter(a => !a.done);
      const done = actions.filter(a =>  a.done);
      const all  = [...open, ...done];

      const listHtml = all.length === 0
        ? '<p class="ff-empty">No actions yet.</p>'
        : all.map(action => `
            <div class="action-item${action.done ? ' action-item--done' : ''}">
              <button class="action-check${action.done ? ' done' : ''}"
                data-action-id="${escHtml(action.id)}"
                data-hubspot-id="${escHtml(action.hubspot_id)}"
                title="${action.done ? 'Mark open' : 'Mark done'}">
                ${action.done ? `<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,6 5,9 10,3"/></svg>` : ''}
              </button>
              <div class="action-name${action.done ? ' done' : ''}">${escHtml(action.name)}</div>
              <span class="priority-badge priority-${escHtml(action.priority)}">${escHtml(action.priority.charAt(0).toUpperCase() + action.priority.slice(1))}</span>
              <button class="action-delete" data-action-id="${escHtml(action.id)}" data-hubspot-id="${escHtml(action.hubspot_id)}" aria-label="Delete">
                <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/></svg>
              </button>
            </div>
          `).join('');

      const openCount = open.length;
      return `
        <div class="actions-header">
          <div>
            <div class="card-section-label" style="margin-bottom:0">CS actions</div>
            ${openCount > 0 ? `<div class="actions-open-count">${openCount} open</div>` : ''}
          </div>
          <button class="add-btn" id="card-add-btn">＋ Add</button>
        </div>
        <div id="card-add-form" class="card-add-form" style="display:none">
          <input type="text" id="card-action-name" class="card-action-input" placeholder="Action name…" maxlength="200" autofocus>
          <select id="card-action-priority" class="card-action-select">
            <option value="high">High</option>
            <option value="med" selected>Med</option>
            <option value="low">Low</option>
          </select>
          <button class="card-action-save" id="card-action-save">Add</button>
          <button class="card-action-cancel" id="card-action-cancel">Cancel</button>
        </div>
        ${listHtml}
      `;
    }

    function rerenderCardActions() {
      const right = document.querySelector('.card-modal-right');
      if (!right || !openCardId) return;
      const actions = actionsMap.get(openCardId) ?? [];
      right.innerHTML = renderCardRight(actions);
    }

    function closeInlinePopover() {
      const p = document.getElementById('inline-add-popover');
      if (!p) return;
      p.classList.remove('inline-add-popover--open');
      p.innerHTML = '';
      delete p.dataset.hubspotId;
    }

    function openInlinePopover(btn) {
      closeInlinePopover();
      closeCard();
      const hid  = btn.dataset.hubspotId;
      const rect = btn.getBoundingClientRect();
      const p    = document.getElementById('inline-add-popover');
      p.innerHTML = `
        <input type="text" class="inline-action-name" placeholder="Action name…" maxlength="200">
        <select class="inline-action-priority">
          <option value="high">High</option>
          <option value="med" selected>Med</option>
          <option value="low">Low</option>
        </select>
        <button class="inline-action-save">Add</button>
      `;
      p.dataset.hubspotId = hid;
      p.style.top  = `${rect.bottom + window.scrollY + 4}px`;
      p.style.left = `${rect.left  + window.scrollX}px`;
      p.classList.add('inline-add-popover--open');
      p.querySelector('.inline-action-name')?.focus();
    }

    function openCard(company) {
      closeInlinePopover();
      const c       = isContactObj(company.contact) ? company.contact : null;
      const gmailUrl = c?.email
        ? `https://mail.google.com/mail/?view=cm&to=${encodeURIComponent(c.email)}`
        : null;
      const calls   = firefliesActionsMap.get(company.domain) ?? [];
      const actions = actionsMap.get(String(company.hubspot_id ?? '')) ?? [];

      openCardId = String(company.hubspot_id ?? '');

      const overlay = document.getElementById('card-overlay');
      overlay.innerHTML = `
        <div class="card-modal" id="card-modal">
          <div class="card-modal-header">
            <div>
              <div class="card-modal-company">${escHtml(company.name ?? company.hubspot_id)}</div>
              <div class="card-modal-domain">${escHtml(company.domain ?? '')}${
                company.hubspot_url
                  ? ` · <a href="${safeHref(company.hubspot_url)}" target="_blank" rel="noopener" class="card-hs-link">HubSpot ↗</a>`
                  : ''
              }</div>
            </div>
            <button class="card-modal-close" id="card-close">×</button>
          </div>
          <div class="card-modal-body">
            <div class="card-modal-left">${renderCardLeft(company, c, gmailUrl, calls)}</div>
            <div class="card-modal-right">${renderCardRight(actions)}</div>
          </div>
        </div>
      `;
      overlay.classList.add('card-overlay--open');
      document.addEventListener('keydown', handleCardKeydown);
    }

    function closeCard() {
      const overlay = document.getElementById('card-overlay');
      overlay.classList.remove('card-overlay--open');
      overlay.innerHTML = '';
      openCardId = null;
      document.removeEventListener('keydown', handleCardKeydown);
    }

    function handleCardKeydown(e) {
      if (e.key === 'Escape') closeCard();
    }

    // --- Action CRUD ---

    async function createAction(hubspot_id, name, priority) {
      try {
        const res = await fetch(`${WORKER_URL}/actions`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ hubspot_id: String(hubspot_id), name, priority }),
        });
        if (!res.ok) throw new Error(await res.text());
        const action = await res.json();
        const list = actionsMap.get(String(hubspot_id)) ?? [];
        actionsMap.set(String(hubspot_id), [...list, action]);
        return action;
      } catch (e) {
        console.error('[actions] create failed:', e);
        return null;
      }
    }

    async function toggleAction(id, hubspot_id, currentDone) {
      try {
        const res = await fetch(`${WORKER_URL}/actions/${encodeURIComponent(id)}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ done: currentDone ? 0 : 1 }),
        });
        if (!res.ok) throw new Error(await res.text());
        const updated = await res.json();
        const list = actionsMap.get(String(hubspot_id)) ?? [];
        actionsMap.set(String(hubspot_id), list.map(a => a.id === id ? updated : a));
        return updated;
      } catch (e) {
        console.error('[actions] toggle failed:', e);
        return null;
      }
    }

    async function deleteAction(id, hubspot_id) {
      try {
        const res = await fetch(`${WORKER_URL}/actions/${encodeURIComponent(id)}`, {
          method: 'DELETE',
        });
        if (!res.ok && res.status !== 204) throw new Error(await res.text());
        const list = actionsMap.get(String(hubspot_id)) ?? [];
        actionsMap.set(String(hubspot_id), list.filter(a => a.id !== id));
        return true;
      } catch (e) {
        console.error('[actions] delete failed:', e);
        return false;
      }
    }

    function showCardError(msg) {
      const right = document.querySelector('.card-modal-right');
      if (!right) return;
      const err = document.createElement('div');
      err.style.cssText = 'font-size:12px;color:#C43E3E;padding:4px 0;';
      err.textContent = msg;
      right.prepend(err);
      setTimeout(() => err.remove(), 3000);
    }

    // --- Render ---

    function render() {
      const table      = document.querySelector('.crm-table');
      const thead      = table.querySelector('thead');
      const tbody      = table.querySelector('tbody');
      const query    = document.getElementById('crm-search').value.trim();
      const filtered = allRows.filter(c =>
        (!query || searchMatch(c, query)) &&
        (!typeFilter || c.type === typeFilter)
      );
      const display    = sortedRows(filtered);

      const effectiveOrder = getEffectiveOrder();
      thead.innerHTML = `<tr>${effectiveOrder.map(col => COL_HEADERS[col]()).join('')}</tr>`;

      thead.querySelectorAll('th[data-col]').forEach(th => th.removeAttribute('aria-sort'));
      const activeTh = thead.querySelector(`th[data-col="${sortKey}"]`);
      if (activeTh) activeTh.setAttribute('aria-sort', sortDir === 'asc' ? 'ascending' : 'descending');

      tbody.innerHTML = display.map(company =>
        `<tr>${effectiveOrder.map(col => CELLS[col](company)).join('')}</tr>`
      ).join('');

      applyColWidths();
      applyFrozenStyles();

      const total = allRows.length;
      const shown = display.length;
      document.getElementById('crm-count').textContent =
        (query || typeFilter) ? `${shown} of ${total} customers` : `${total} customers`;
    }


    // --- Init ---

    Promise.all([
      fetch('./data/hubspot.json').then(r => { if (!r.ok) throw new Error(r.status); return r.json(); }),
      fetch('./data/posthog.json').then(r => r.ok ? r.json() : []).catch(() => []),
      fetch('./data/fireflies.json').then(r => r.ok ? r.json() : []).catch(() => []),
      fetch('./data/pylon.json').then(r => r.ok ? r.json() : []).catch(() => []),
      fetch(`${WORKER_URL}/actions`, { signal: AbortSignal.timeout(5000) }).then(r => r.ok ? r.json() : []).catch(() => []),
    ]).then(([hubspot, posthog, fireflies, pylon, actions]) => {
      posthogMap = new Map(posthog.map(r => [normName(r.org_name), r]));
      pylonMap   = new Map(pylon.map(r => [String(r.hubspot_id), r]));

      // firefliesMap: domain → most-recent call (used by Last call column)
      firefliesMap = new Map();
      for (const entry of fireflies) {
        if (!firefliesMap.has(entry.domain) || entry.date > firefliesMap.get(entry.domain).date) {
          firefliesMap.set(entry.domain, entry);
        }
      }

      // firefliesActionsMap: domain → all calls sorted most-recent first (used by card)
      firefliesActionsMap = new Map();
      for (const entry of fireflies) {
        if (!firefliesActionsMap.has(entry.domain)) firefliesActionsMap.set(entry.domain, []);
        firefliesActionsMap.get(entry.domain).push(entry);
      }
      for (const [, calls] of firefliesActionsMap) {
        calls.sort((a, b) => b.date.localeCompare(a.date));
      }

      // actionsMap: hubspot_id (string) → action[]
      actionsMap = new Map();
      for (const action of actions) {
        if (!actionsMap.has(action.hubspot_id)) actionsMap.set(action.hubspot_id, []);
        actionsMap.get(action.hubspot_id).push(action);
      }

      allRows = hubspot;
      render();
    }).catch(() => {
      document.getElementById('crm-table-wrap').outerHTML =
        '<p class="crm-error">Customer data couldn\'t be loaded. Try refreshing.</p>';
    });

    document.getElementById('crm-search').addEventListener('input', render);

    document.getElementById('crm-type-pills').addEventListener('click', e => {
      const pill = e.target.closest('.crm-pill');
      if (!pill) return;
      typeFilter = pill.dataset.type;
      document.querySelectorAll('#crm-type-pills .crm-pill').forEach(p =>
        p.classList.toggle('crm-pill--active', p === pill)
      );
      render();
    });

    // --- Column header dropdown menu ---
    let activeMenuCol = null;

    function closeColMenu() {
      const m = document.getElementById('col-menu');
      if (m) m.classList.remove('col-menu--open');
      activeMenuCol = null;
    }

    function showColMenu(th, col) {
      const m = document.getElementById('col-menu');
      if (!m) return;
      // Toggle off if same column clicked again
      if (activeMenuCol === col) { closeColMenu(); return; }
      activeMenuCol = col;

      const frozen = frozenCols.has(col);
      m.innerHTML = `
        <button class="col-menu-item" data-action="sort-asc">Sort A → Z ↑</button>
        <button class="col-menu-item" data-action="sort-desc">Sort Z → A ↓</button>
        ${sortKey === col ? `<button class="col-menu-item" data-action="sort-clear">Clear sort</button>` : ''}
        <div class="col-menu-divider"></div>
        <button class="col-menu-item" data-action="freeze">${frozen ? 'Unfreeze column' : 'Freeze column'}</button>
      `;
      m.dataset.col = col;

      const rect = th.getBoundingClientRect();
      m.style.top  = `${rect.bottom + window.scrollY}px`;
      m.style.left = `${rect.left  + window.scrollX}px`;
      m.classList.add('col-menu--open');
    }

    document.getElementById('col-menu').addEventListener('click', e => {
      const item = e.target.closest('.col-menu-item');
      if (!item) return;
      const col    = document.getElementById('col-menu').dataset.col;
      const action = item.dataset.action;
      if (action === 'sort-asc')   { sortKey = col; sortDir = 'asc';  render(); }
      if (action === 'sort-desc')  { sortKey = col; sortDir = 'desc'; render(); }
      if (action === 'sort-clear') { sortKey = 'name'; sortDir = 'asc'; render(); }
      if (action === 'freeze') {
        if (frozenCols.has(col)) { frozenCols.delete(col); } else { frozenCols.add(col); }
        saveFrozenCols();
        render();
      }
      closeColMenu();
    });

    document.addEventListener('click', e => {
      if (!e.target.closest('#col-menu') && !e.target.closest('th[data-col]')) closeColMenu();
    }, true);

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeColMenu(); });

    // --- Sort + header click ---
    const crmTable = document.querySelector('.crm-table');

    crmTable.addEventListener('click', e => {
      if (e.target.closest('.crm-resize-handle')) return;
      const th = e.target.closest('th[data-col]');
      if (!th) return;
      showColMenu(th, th.dataset.col);
    });

    // --- Drag-to-reorder ---
    let dragSrcCol  = null;
    let isResizing  = false;

    crmTable.addEventListener('dragstart', e => {
      if (isResizing) { e.preventDefault(); return; }
      const th = e.target.closest('th[data-col]');
      if (!th) return;
      dragSrcCol = th.dataset.col;
      th.classList.add('crm-th--dragging');
    });

    crmTable.addEventListener('dragover', e => {
      e.preventDefault();
      const th = e.target.closest('th');
      if (!th) return;
      document.querySelectorAll('.crm-table thead th').forEach(el => el.classList.remove('crm-th--drag-over'));
      th.classList.add('crm-th--drag-over');
    });

    crmTable.addEventListener('dragend', () => {
      document.querySelectorAll('.crm-table thead th').forEach(el => {
        el.classList.remove('crm-th--dragging');
        el.classList.remove('crm-th--drag-over');
      });
      dragSrcCol = null;
    });

    crmTable.addEventListener('drop', e => {
      e.preventDefault();
      const targetCol = e.target.closest('th[data-col]')?.dataset.col;
      if (!dragSrcCol || !targetCol || dragSrcCol === targetCol) return;
      const srcIdx = colOrder.indexOf(dragSrcCol);
      const tgtIdx = colOrder.indexOf(targetCol);
      if (srcIdx === -1 || tgtIdx === -1) return;
      [colOrder[srcIdx], colOrder[tgtIdx]] = [colOrder[tgtIdx], colOrder[srcIdx]];
      localStorage.setItem('plg_crm_col_order', JSON.stringify(colOrder));
      render();
    });

    // Card open: delegated click on ⊞ button
    document.querySelector('.crm-table').addEventListener('click', e => {
      const btn = e.target.closest('.card-open-btn');
      if (!btn) return;
      const hid = btn.dataset.hubspotId;
      const company = allRows.find(r => String(r.hubspot_id ?? '') === hid);
      if (company) openCard(company);
    });

    // Card close: click on overlay backdrop (outside the modal)
    document.getElementById('card-overlay').addEventListener('click', e => {
      if (e.target === document.getElementById('card-overlay')) closeCard();
    });

    // Card close: × button
    document.getElementById('card-overlay').addEventListener('click', e => {
      if (e.target.closest('#card-close')) closeCard();
    });

    // Card CRUD: add form, toggle, delete
    document.getElementById('card-overlay').addEventListener('click', async e => {
      // Show add form
      if (e.target.closest('#card-add-btn')) {
        const form = document.getElementById('card-add-form');
        if (form) { form.style.display = 'flex'; document.getElementById('card-action-name')?.focus(); }
        return;
      }

      // Cancel add form
      if (e.target.closest('#card-action-cancel')) {
        const form = document.getElementById('card-add-form');
        if (form) form.style.display = 'none';
        return;
      }

      // Save new action
      if (e.target.closest('#card-action-save')) {
        const name     = document.getElementById('card-action-name')?.value.trim();
        const priority = document.getElementById('card-action-priority')?.value;
        if (!name) { document.getElementById('card-action-name')?.focus(); return; }
        const action = await createAction(openCardId, name, priority);
        if (!action) { showCardError("Couldn't save — try again"); return; }
        rerenderCardActions();
        render();
        return;
      }

      // Toggle done
      const checkBtn = e.target.closest('.action-check');
      if (checkBtn) {
        const id       = checkBtn.dataset.actionId;
        const hid      = checkBtn.dataset.hubspotId;
        const actions  = actionsMap.get(hid) ?? [];
        const existing = actions.find(a => a.id === id);
        if (!existing) return;
        const updated = await toggleAction(id, hid, existing.done);
        if (!updated) { showCardError("Couldn't save — try again"); return; }
        rerenderCardActions();
        render();
        return;
      }

      // Delete
      const delBtn = e.target.closest('.action-delete');
      if (delBtn) {
        const id  = delBtn.dataset.actionId;
        const hid = delBtn.dataset.hubspotId;
        const ok  = await deleteAction(id, hid);
        if (!ok) { showCardError("Couldn't delete — try again"); return; }
        rerenderCardActions();
        render();
        return;
      }
    });

    // Enter key in card add form
    document.getElementById('card-overlay').addEventListener('keydown', async e => {
      if (e.key !== 'Enter') return;
      if (!e.target.closest('#card-add-form')) return;
      e.preventDefault();
      document.getElementById('card-action-save')?.click();
    });

    // Inline add: delegated click on + Add button in CS actions column
    document.querySelector('.crm-table').addEventListener('click', e => {
      const btn = e.target.closest('.add-action-btn');
      if (!btn) return;
      openInlinePopover(btn);
    });

    // Inline popover: save on button click
    document.getElementById('inline-add-popover').addEventListener('click', async e => {
      if (!e.target.closest('.inline-action-save')) return;
      const p        = document.getElementById('inline-add-popover');
      const hid      = p.dataset.hubspotId;
      const name     = p.querySelector('.inline-action-name')?.value.trim();
      const priority = p.querySelector('.inline-action-priority')?.value;
      if (!name) { p.querySelector('.inline-action-name')?.focus(); return; }
      const action = await createAction(hid, name, priority);
      if (!action) return;
      closeInlinePopover();
      render();
    });

    // Inline popover: save on Enter key
    document.getElementById('inline-add-popover').addEventListener('keydown', async e => {
      if (e.key !== 'Enter') return;
      e.preventDefault();
      document.querySelector('#inline-add-popover .inline-action-save')?.click();
    });

    // Inline popover: close on Escape
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeInlinePopover();
    });

    // Inline popover: close on click outside
    document.addEventListener('click', e => {
      const p = document.getElementById('inline-add-popover');
      if (!p?.classList.contains('inline-add-popover--open')) return;
      if (!p.contains(e.target) && !e.target.closest('.add-action-btn')) closeInlinePopover();
    }, true);

    // --- Column resize ---
    let resizingCol = null;
    let resizeStartX = 0;
    let resizeStartW = 0;

    document.addEventListener('mousedown', e => {
      const handle = e.target.closest('.crm-resize-handle');
      if (!handle) return;
      const th = handle.closest('th[data-col]');
      if (!th) return;
      isResizing  = true;
      resizingCol = th.dataset.col;
      resizeStartX = e.clientX;
      resizeStartW = colWidths[resizingCol] ?? DEFAULT_COL_WIDTHS[resizingCol];
      handle.classList.add('crm-resize-handle--active');
      e.preventDefault();
    });

    document.addEventListener('mousemove', e => {
      if (!isResizing || !resizingCol) return;
      const newW = Math.max(60, resizeStartW + (e.clientX - resizeStartX));
      colWidths[resizingCol] = newW;
      applyColWidths();
    });

    document.addEventListener('mouseup', () => {
      if (!isResizing) return;
      isResizing = false;
      document.querySelectorAll('.crm-resize-handle--active').forEach(h =>
        h.classList.remove('crm-resize-handle--active')
      );
      resizingCol = null;
      saveColWidths();
    });

    // Inline edit for local_notes cells
    document.querySelector('.crm-table').addEventListener('dblclick', e => {
      const td = e.target.closest('.crm-local-notes-cell');
      if (!td || td.querySelector('input')) return;
      const hid  = td.dataset.hubspotId;
      const note = localNotes[hid] ?? '';
      const input = document.createElement('input');
      input.type = 'text';
      input.value = note;
      input.className = 'crm-local-notes-input';
      input.style.cssText = 'width:100%;font:inherit;padding:2px 4px;border:1px solid #00AF66;border-radius:4px;outline:none;background:#fff;';
      td.innerHTML = '';
      td.appendChild(input);
      input.focus();
      input.select();
      const save = () => {
        const val = input.value.trim();
        if (val) localNotes[hid] = val;
        else delete localNotes[hid];
        saveLocalNotes();
        render();
      };
      input.addEventListener('blur', save);
      input.addEventListener('keydown', e2 => {
        if (e2.key === 'Enter') { e2.preventDefault(); save(); }
        if (e2.key === 'Escape') { e2.stopPropagation(); render(); }
      });
    });
  </script>

</body>
</html>
